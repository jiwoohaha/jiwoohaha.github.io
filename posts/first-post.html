<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>첫 글 - Jiwoo Blog</title>
  
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

  <style>
    /* =========================================
       1. Reset & Base Variables (메인과 동일)
       ========================================= */
    :root {
      --bg-color: #050505;
      --surface-color: rgba(20, 15, 30, 0.4);
      --border-color: rgba(139, 92, 246, 0.15);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      
      --purple-light: #c084fc;
      --purple-main: #9333ea;
      --purple-dark: #3b0764;
      
      --glow-spread: rgba(147, 51, 234, 0.4);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-primary);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.8; /* 본문 가독성을 위해 약간 넓힘 */
    }

    /* =========================================
       2. Animated Background (메인과 동일)
       ========================================= */
    .bg-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      overflow: hidden;
      background-color: var(--bg-color);
      /* Subtle Grid Pattern for Tech Vibe */
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    /* Floating Purple Orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.6;
      animation: float 20s infinite ease-in-out alternate;
    }

    .orb-1 {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--purple-main), transparent 70%);
      top: -200px;
      left: -100px;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, var(--purple-dark), transparent 70%);
      bottom: -150px;
      right: -100px;
      animation-duration: 25s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(50px, 30px) scale(1.1); }
      100% { transform: translate(-30px, -50px) scale(0.9); }
    }

    /* =========================================
       3. Layout & Post Card (Glassmorphism)
       ========================================= */
    .wrap {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 60px 20px; /* 메인보다 패딩을 많이 줌 */
    }

    .post-card {
      position: relative;
      width: 100%;
      max-width: 800px; /* 본문용으로 약간 넓힘 */
      padding: 60px 50px;
      border-radius: 24px;
      
      /* Glass Effect (메인과 동일) */
      background: linear-gradient(145deg, rgba(30, 25, 45, 0.6), rgba(15, 10, 20, 0.8));
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      box-shadow: 
        0 20px 40px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      
      transform: translateY(20px);
      opacity: 0;
      animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      transition: transform 0.4s ease, box-shadow 0.4s ease, border-color 0.4s ease;
    }

    .post-card:hover {
      transform: translateY(-5px) !important;
      box-shadow: 
        0 30px 60px rgba(0, 0, 0, 0.6),
        0 0 40px rgba(147, 51, 234, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      border-color: rgba(139, 92, 246, 0.3);
    }

    @keyframes fadeUp {
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* =========================================
       4. Post Typography
       ========================================= */
    .date {
      color: var(--text-secondary);
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 12px;
      display: block;
    }

    h1 {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 40px;
      /* Text Gradient (메인과 동일) */
      background: linear-gradient(135deg, #ffffff 0%, var(--purple-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      font-size: 1.1rem;
      color: var(--text-secondary);
      margin-bottom: 24px;
      font-weight: 400;
      word-break: keep-all;
    }

    p .highlight {
      color: var(--text-primary);
      font-weight: 600;
    }

    /* 본문 내 링크 스타일 (필요시 사용) */
    p a {
      color: var(--purple-light);
      text-decoration: none;
      font-weight: 600;
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s ease;
    }
    p a:hover {
      border-color: var(--purple-light);
    }

    /* =========================================
       5. Back Button (메인 버튼 스타일 적용)
       ========================================= */
    .actions {
      margin-top: 60px;
      border-top: 1px solid var(--border-color);
      padding-top: 40px;
      text-align: center;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 32px;
      border-radius: 14px;
      font-size: 1.1rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      overflow: hidden;
      
      /* Secondary Button 스타일 적용 (메인과 동일) */
      background: rgba(255, 255, 255, 0.03);
      color: var(--text-primary);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
    }

    .btn-back:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    /* SVG Icons styling */
    .btn-back svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
      transition: transform 0.3s ease;
    }

    .btn-back:hover svg {
      transform: translateX(-4px); /* 왼쪽 화살표이므로 왼쪽으로 이동 */
    }

    /* =========================================
       6. Responsive Design
       ========================================= */
    @media (max-width: 600px) {
      .post-card {
        padding: 40px 24px;
      }
      h1 {
        font-size: 2.2rem;
      }
      p {
        font-size: 1rem;
      }
      .btn-back {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  
  <div class="bg-container">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <main class="wrap">
    <article class="post-card">
      <time class="date" datetime="2026-04-09">2026.04.09</time>
      <h1>첫 글</h1>

      <div class="post-content">
        <p>안녕하세요. 이 글은 제 깃허브 블로그의 첫 게시글입니다.</p>

        <p>
          앞으로 이 블로그에는 <span class="highlight">공부한 내용, 개발하면서 배운 점, 그리고 보안 관련 기록</span>들을 차근차근 정리해볼 생각입니다.
        </p>

        <p>
          처음에는 단순한 기록용으로 시작하지만, 나중에는 제가 다시 찾아보는 노트이자 <span class="highlight">포트폴리오</span>처럼 쓸 수 있는 공간으로 키워보고 싶습니다.
        </p>
      </div>

      <div class="actions">
        <a href="../index.html" class="btn-back">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          </svg>
          글 목록 가기로
        </a>
      </div>
    </article>
  </main>
  
</body>
</html>
