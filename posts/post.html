<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>글 목록 - Jiwoo Blog</title>
  
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

  <style>
    /* =========================================
       1. Reset & Base Variables
       ========================================= */
    :root {
      --bg-color: #050505;
      --surface-color: rgba(20, 15, 30, 0.4);
      --border-color: rgba(139, 92, 246, 0.15);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      
      --purple-light: #c084fc;
      --purple-main: #9333ea;
      --purple-dark: #3b0764;
      --purple-hover: #7e22ce;
      
      --glow-spread: rgba(147, 51, 234, 0.4);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-primary);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
    }

    /* =========================================
       2. Animated Background
       ========================================= */
    .bg-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      background-color: var(--bg-color);
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.6;
      animation: float 20s infinite ease-in-out alternate;
    }

    .orb-1 {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--purple-main), transparent 70%);
      top: -200px;
      left: -100px;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, var(--purple-dark), transparent 70%);
      bottom: -150px;
      right: -100px;
      animation-duration: 25s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(50px, 30px) scale(1.1); }
      100% { transform: translate(-30px, -50px) scale(0.9); }
    }

    /* =========================================
       3. Layout & List Card
       ========================================= */
    .wrap {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 80px 20px;
    }

    .list-card {
      position: relative;
      width: 100%;
      max-width: 800px;
      padding: 60px 50px;
      border-radius: 24px;
      background: linear-gradient(145deg, rgba(30, 25, 45, 0.6), rgba(15, 10, 20, 0.8));
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      transform: translateY(20px);
      opacity: 0;
      animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fadeUp {
      to { transform: translateY(0); opacity: 1; }
    }

    /* =========================================
       4. Typography & Post List Styles
       ========================================= */
    .header-section {
      text-align: center;
      margin-bottom: 50px;
    }

    h1 {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #ffffff 0%, var(--purple-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    h1 .dot {
      color: var(--purple-main);
      -webkit-text-fill-color: var(--purple-main);
    }

    .header-desc {
      font-size: 1.1rem;
      color: var(--text-secondary);
    }

    .post-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 50px;
      min-height: 100px;
    }

    .loading-msg {
      text-align: center;
      color: var(--text-secondary);
      padding: 20px 0;
    }

    .post-item-wrapper {
      position: relative;
    }

    .post-item {
      display: block;
      padding: 30px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      text-decoration: none;
      position: relative;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .post-item:hover {
      background: rgba(147, 51, 234, 0.08);
      border-color: rgba(147, 51, 234, 0.4);
      transform: translateX(8px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
    }

    .post-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: var(--purple-main);
      transform: scaleY(0);
      transition: transform 0.3s ease;
      transform-origin: bottom;
    }

    .post-item:hover::before {
      transform: scaleY(1);
    }

    .post-date {
      display: block;
      font-size: 0.9rem;
      color: var(--purple-light);
      font-weight: 600;
      margin-bottom: 8px;
    }

    .post-item h2 {
      color: var(--text-primary);
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 12px;
      transition: color 0.3s ease;
      padding-right: 40px; 
    }

    .post-item:hover h2 {
      color: #ffffff;
    }

    .post-excerpt {
      color: var(--text-secondary);
      font-size: 1rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* 삭제 버튼 스타일 */
    .btn-delete {
      position: absolute;
      top: 25px;
      right: 20px;
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
      transition: all 0.2s ease;
      z-index: 10;
    }

    .btn-delete:hover {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
    }

    .btn-delete svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
    }

    /* =========================================
       5. Actions & Modals
       ========================================= */
    .actions {
      border-top: 1px solid var(--border-color);
      padding-top: 40px;
      text-align: center;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 32px;
      border-radius: 14px;
      font-weight: 600;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.03);
      color: var(--text-primary);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }

    .btn-back:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    .btn-back svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }
    
    .fab-write {
      position: fixed;
      bottom: 40px;
      right: 40px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--purple-main) 0%, var(--purple-hover) 100%);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 15px var(--glow-spread);
      cursor: pointer;
      z-index: 100;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .fab-write:hover {
      transform: scale(1.1) translateY(-5px);
      box-shadow: 0 8px 25px rgba(147, 51, 234, 0.6);
    }

    .fab-write svg {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      background: linear-gradient(145deg, #1e1a26, #110c14);
      border: 1px solid var(--border-color);
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 700px;
      transform: translateY(20px);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-overlay.active .modal-content {
      transform: translateY(0);
    }

    .modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 1.5rem;
      cursor: pointer;
    }

    .modal-close:hover {
      color: var(--text-primary);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    .form-control {
      width: 100%;
      padding: 14px 16px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 1rem;
      transition: 0.3s;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--purple-main);
      box-shadow: 0 0 0 3px rgba(147, 51, 234, 0.2);
    }

    .btn-submit {
      width: 100%;
      padding: 16px;
      background: var(--purple-main);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }

    .btn-submit:hover {
      background: var(--purple-hover);
    }

    .btn-danger {
      background: #ef4444;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    .error-msg {
      color: #ef4444;
      font-size: 0.9rem;
      margin-top: 8px;
      display: none;
    }

    .modal-section {
      display: none;
    }

    .modal-section.active {
      display: block;
    }

    /* =========================================
       6. Quill Editor 다크테마 커스텀
       ========================================= */
    .ql-toolbar.ql-snow {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-top-left-radius: 10px;
      border-top-right-radius: 10px;
    }

    .ql-container.ql-snow {
      border: 1px solid rgba(255,255,255,0.1);
      border-bottom-left-radius: 10px;
      border-bottom-right-radius: 10px;
      font-family: inherit;
      font-size: 1rem;
      min-height: 300px;
    }

    .ql-snow .ql-stroke {
      stroke: #cbd5e1;
    }

    .ql-snow .ql-fill, .ql-snow .ql-stroke.ql-fill {
      fill: #cbd5e1;
    }

    .ql-snow .ql-picker {
      color: #cbd5e1;
    }

    .ql-snow .ql-picker-options {
      background-color: #1e293b;
      border-color: rgba(255,255,255,0.1);
    }

    .ql-snow .ql-picker-item:hover, .ql-snow .ql-picker-label:hover {
      color: var(--purple-light);
    }

    .ql-editor.ql-blank::before {
      color: rgba(255,255,255,0.3);
      font-style: normal;
    }

    @media (max-width: 600px) {
      .list-card { padding: 40px 24px; }
      .post-item h2 { font-size: 1.3rem; }
      .modal-content { margin: 20px; padding: 30px 20px; }
    }
  </style>
</head>
<body>
  
  <div class="bg-container">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <main class="wrap">
    <div class="list-card">
      <div class="header-section">
        <h1>Posts<span class="dot">.</span></h1>
        <p class="header-desc">지금까지 작성된 글 목록입니다.</p>
      </div>

      <div class="post-list" id="postListContainer">
        <div class="loading-msg">글 목록을 불러오는 중입니다... ⏳</div>
      </div>

      <div class="actions">
       <a href="/index.html" class="btn-back">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          </svg>
          메인 웹사이트로
        </a>
      </div>
    </div>
  </main>

  <div class="fab-write" id="openModalBtn" title="글 작성하기">
    <svg viewBox="0 0 24 24">
      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
      <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
    </svg>
  </div>

  <div class="modal-overlay" id="actionModal">
    <div class="modal-content">
      <button class="modal-close" id="closeModalBtn">&times;</button>
      
      <div id="authSection" class="modal-section">
        <h2 class="modal-title" id="authTitle" style="color:white;">관리자 인증</h2>
        <div class="form-group">
          <label for="adminPw">작업을 수행하려면 GitHub Token을 입력하세요.</label>
          <input type="password" id="adminPw" class="form-control" placeholder="ghp_ 또는 github_pat_ 로 시작">
          <div class="error-msg" id="pwError">유효한 GitHub 토큰 형식이 아닙니다.</div>
        </div>
        <button class="btn-submit" id="checkPwBtn">인증 확인</button>
      </div>

      <div id="writeSection" class="modal-section">
        <h2 class="modal-title" style="color:white;">새 글 작성</h2>
        <div class="form-group">
          <label for="postTitle">제목</label>
          <input type="text" id="postTitle" class="form-control" placeholder="제목을 입력하세요">
        </div>
        <div class="form-group">
          <label>내용</label>
          <div id="editor-container"></div>
        </div>
        <button class="btn-submit" id="submitPostBtn">GitHub에 발행하기</button>
      </div>

      <div id="deleteSection" class="modal-section">
        <h2 class="modal-title" style="color: #ef4444;">글 삭제</h2>
        <p style="color: var(--text-secondary); margin-bottom: 20px;">
          정말로 이 글을 삭제하시겠습니까?<br>이 작업은 되돌릴 수 없습니다.
        </p>
        <p id="deleteTargetTitle" style="font-weight: bold; margin-bottom: 30px;"></p>
        <button class="btn-submit btn-danger" id="confirmDeleteBtn">영구 삭제하기</button>
      </div>
    </div>
  </div>

 <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
 <script>
  // ==========================================
  // 0. Quill 에디터 초기화
  // ==========================================
  var quill = new Quill('#editor-container', {
    theme: 'snow',
    placeholder: '사진, 동영상 링크, 코드를 마음껏 넣어보세요...',
    modules: {
      toolbar: [
        [{ 'header': [1, 2, 3, false] }], // 제목 크기
        ['bold', 'italic', 'underline', 'strike'], // 글씨체
        [{ 'color': [] }, { 'background': [] }], // 색상 설정
        ['blockquote', 'code-block'], // 인용구, 코드블럭
        [{ 'list': 'ordered'}, { 'list': 'bullet' }], // 리스트
        ['link', 'image', 'video'], // 미디어 첨부
        ['clean'] // 포맷 초기화
      ]
    }
  });

  // ==========================================
  // 1. 공통 설정
  // ==========================================
  const GITHUB_OWNER = 'jiwoohaha'; 
  const GITHUB_REPO = 'jiwoohaha.github.io'; 

  let githubToken = ''; 
  let currentAction = ''; 
  let targetFileToDelete = null; 

  const modal = document.getElementById('actionModal');
  const closeBtn = document.getElementById('closeModalBtn');
  const sections = { 
    auth: document.getElementById('authSection'), 
    write: document.getElementById('writeSection'), 
    delete: document.getElementById('deleteSection') 
  };
  const pwInput = document.getElementById('adminPw');
  const pwError = document.getElementById('pwError');

  function showSection(sectionName) {
    Object.values(sections).forEach(sec => sec.classList.remove('active'));
    sections[sectionName].classList.add('active');
  }

  function openModal(action) {
    currentAction = action;
    modal.classList.add('active');
    pwError.style.display = 'none';

    if (githubToken) {
      showSection(action);
    } else {
      showSection('auth');
      document.getElementById('authTitle').innerText = action === 'delete' ? '삭제 권한 인증' : '작성 권한 인증';
      pwInput.value = '';
      setTimeout(() => pwInput.focus(), 100);
    }
  }

  closeBtn.addEventListener('click', () => { 
    modal.classList.remove('active'); 
    targetFileToDelete = null; 
  });

  document.getElementById('checkPwBtn').addEventListener('click', verifyToken);
  
  pwInput.addEventListener('keypress', (e) => { 
    if (e.key === 'Enter') verifyToken(); 
  });

  function verifyToken() {
    const token = pwInput.value.trim();
    if (token.startsWith('ghp_') || token.startsWith('github_pat_')) {
      githubToken = token; 
      showSection(currentAction); 
    } else {
      pwError.style.display = 'block'; 
      pwInput.focus();
    }
  }

  // ==========================================
  // 2. 글 목록 불러오기 로직
  // ==========================================
  async function loadPostList() {
    const postListContainer = document.getElementById('postListContainer');
    try {
      const response = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/posts`);
      
      if (response.status === 404) {
        postListContainer.innerHTML = '<div class="loading-msg">아직 작성된 글이 없습니다. 우측 하단의 ✏️ 버튼으로 첫 글을 작성해보세요!</div>';
        return;
      }
      
      if (response.status === 403) {
        throw new Error("GitHub API 요청 한도를 초과했습니다. 잠시 후 다시 시도해주세요.");
      }
      
      if (!response.ok) {
        throw new Error("API 요청 실패");
      }
      
      const files = await response.json();
      postListContainer.innerHTML = ''; 
      
      const htmlFiles = files.filter(file => file.name.endsWith('.html') && /^\d{4}-\d{2}-\d{2}-/.test(file.name)).reverse();
        
      if (htmlFiles.length === 0) {
        postListContainer.innerHTML = '<div class="loading-msg">아직 작성된 글이 없습니다. 우측 하단의 ✏️ 버튼으로 첫 글을 작성해보세요!</div>';
        return;
      }

      htmlFiles.forEach(file => {
        const namePart = file.name.replace('.html', '');
        const match = namePart.match(/^(\d{4}-\d{2}-\d{2})-(.+)$/);
        let date = match ? match[1].replace(/-/g, '.') : ''; 
        let title = match ? match[2].replace(/-/g, ' ') : namePart; 

        const postCard = `
          <div class="post-item-wrapper">
            <a href="/${file.path}" class="post-item">
              <time class="post-date">${date}</time>
              <h2>${title}</h2>
              <p class="post-excerpt">클릭하여 글 내용을 확인해보세요.</p>
            </a>
            <button class="btn-delete" title="글 삭제" data-path="${file.path}" data-sha="${file.sha}" data-title="${title}">
              <svg viewBox="0 0 24 24">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                <line x1="10" y1="11" x2="10" y2="17"></line>
                <line x1="14" y1="11" x2="14" y2="17"></line>
              </svg>
            </button>
          </div>
        `;
        postListContainer.innerHTML += postCard;
      });

      document.querySelectorAll('.btn-delete').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault(); 
          e.stopPropagation(); 
          targetFileToDelete = { 
            path: btn.getAttribute('data-path'), 
            sha: btn.getAttribute('data-sha'), 
            title: btn.getAttribute('data-title') 
          };
          document.getElementById('deleteTargetTitle').innerText = `"${targetFileToDelete.title}"`;
          openModal('delete');
        });
      });
      
    } catch (error) {
      postListContainer.innerHTML = `<div class="loading-msg" style="color: #ef4444;">${error.message || "글 목록을 불러올 수 없습니다."}</div>`;
    }
  }

  window.addEventListener('DOMContentLoaded', loadPostList);

  // ==========================================
  // 3. 에디터 글 작성 로직 
  // ==========================================
  document.getElementById('openModalBtn').addEventListener('click', () => openModal('write'));

  document.getElementById('submitPostBtn').addEventListener('click', async () => {
    const title = document.getElementById('postTitle').value;
    
    // Quill 에디터 안에 있는 HTML 코드를 그대로 가져옵니다.
    const content = quill.root.innerHTML;

    // 빈 텍스트인지 체크 (<p><br></p>는 Quill의 기본 빈 상태)
    if (!title || content === '<p><br></p>') {
      return alert("제목과 내용을 모두 입력해주세요.");
    }

    const date = new Date().toISOString().split('T')[0];
    const fileName = title.replace(/ /g, '-'); 
    const path = `posts/${date}-${fileName}.html`; 

    // 생성될 HTML 문서 구조 (에디터에서 작성한 영상/사진이 잘 보이게 CSS 추가)
    const fullHtmlContent = `<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>${title} - Jiwoo Blog</title>
  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link href="https://cdn.quilljs.com/1.3.6/quill.core.css" rel="stylesheet">
  <style>
    body { font-family: 'Pretendard', sans-serif; background: #050505; color: #f8fafc; padding: 40px 20px; line-height: 1.8; margin: 0; }
    .content-box { max-width: 800px; margin: 0 auto; background: #1e293b; padding: 50px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    time { color: #c084fc; font-weight: bold; }
    h1 { font-size: 2.5rem; margin-top: 10px; margin-bottom: 20px; }
    hr { border: 0; height: 1px; background: rgba(255,255,255,0.1); margin-bottom: 40px; }
    
    /* 본문 내 이미지 및 비디오 반응형 처리 */
    .ql-editor { padding: 0; overflow-y: visible; }
    .ql-editor img { max-width: 100%; height: auto; border-radius: 10px; margin: 20px 0; }
    .ql-video { width: 100%; height: 450px; border: none; border-radius: 10px; margin: 20px 0; }
    .ql-editor pre.ql-syntax { background-color: #0f172a; color: #f8fafc; padding: 15px; border-radius: 8px; overflow-x: auto; font-family: monospace; }
    .ql-editor blockquote { border-left: 4px solid #9333ea; padding-left: 16px; margin: 20px 0; color: #cbd5e1; font-style: italic; }

    a.btn-back { display: inline-flex; margin-top: 50px; padding: 12px 24px; background: rgba(255,255,255,0.05); color: #fff; text-decoration: none; border-radius: 12px; font-weight: 600; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); }
    a.btn-back:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
    
    @media (max-width: 600px) {
      body { padding: 20px 10px; }
      .content-box { padding: 30px 20px; }
      .ql-video { height: 250px; }
    }
  </style>
</head>
<body>
  <div class="content-box">
    <time>${date}</time>
    <h1>${title}</h1>
    <hr>
    
    <div class="ql-editor">
      ${content}
    </div>
    
    <br>
    <a href="/posts/post.html" class="btn-back">목록으로 돌아가기</a>
  </div>
</body>
</html>`;

    const base64Content = btoa(unescape(encodeURIComponent(fullHtmlContent)));

    try {
      const btn = document.getElementById('submitPostBtn');
      btn.innerText = "커밋 중..."; 
      btn.disabled = true;

      const response = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${path}`, {
        method: 'PUT',
        headers: { 
          'Authorization': `Bearer ${githubToken}`, 
          'Accept': 'application/vnd.github.v3+json', 
          'Content-Type': 'application/json' 
        },
        body: JSON.stringify({ message: `새 글 작성: ${title}`, content: base64Content })
      });

      if (response.ok) {
        alert("글 작성 완료! 1~2분 뒤 새로고침 하세요.");
        modal.classList.remove('active');
        document.getElementById('postTitle').value = '';
        quill.setContents([]); // 에디터 초기화
      } else {
        throw await response.json();
      }
    } catch (error) {
      alert(`업로드 실패: ${error.message}`);
    } finally {
      const btn = document.getElementById('submitPostBtn');
      btn.innerText = "GitHub에 발행하기"; 
      btn.disabled = false;
    }
  });

  // ==========================================
  // 4. 글 삭제 로직 
  // ==========================================
  document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
    if (!targetFileToDelete) return;
    
    try {
      const btn = document.getElementById('confirmDeleteBtn');
      btn.innerText = "삭제 중..."; 
      btn.disabled = true;

      const response = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${targetFileToDelete.path}`, {
        method: 'DELETE',
        headers: { 
          'Authorization': `Bearer ${githubToken}`, 
          'Accept': 'application/vnd.github.v3+json', 
          'Content-Type': 'application/json' 
        },
        body: JSON.stringify({ message: `글 삭제: ${targetFileToDelete.title}`, sha: targetFileToDelete.sha })
      });

      if (response.ok) {
        alert("글이 삭제되었습니다! 1~2분 뒤 새로고침 하세요.");
        modal.classList.remove('active'); 
        targetFileToDelete = null;
      } else {
        throw await response.json();
      }
    } catch (error) {
      alert(`삭제 실패: ${error.message}`);
    } finally {
      const btn = document.getElementById('confirmDeleteBtn');
      btn.innerText = "영구 삭제하기"; 
      btn.disabled = false;
    }
  });
</script>

</body>
</html>
