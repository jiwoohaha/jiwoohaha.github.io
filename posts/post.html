<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>글 목록 - Jiwoo Blog</title>
  
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

  <style>
    /* =========================================
       1. Reset & Base Variables
       ========================================= */
    :root {
      --bg-color: #050505;
      --surface-color: rgba(20, 15, 30, 0.4);
      --border-color: rgba(139, 92, 246, 0.15);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      
      --purple-light: #c084fc;
      --purple-main: #9333ea;
      --purple-dark: #3b0764;
      
      --glow-spread: rgba(147, 51, 234, 0.4);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-primary);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.6;
    }

    /* =========================================
       2. Animated Background
       ========================================= */
    .bg-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      overflow: hidden;
      background-color: var(--bg-color);
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.6;
      animation: float 20s infinite ease-in-out alternate;
    }

    .orb-1 {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--purple-main), transparent 70%);
      top: -200px;
      left: -100px;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, var(--purple-dark), transparent 70%);
      bottom: -150px;
      right: -100px;
      animation-duration: 25s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(50px, 30px) scale(1.1); }
      100% { transform: translate(-30px, -50px) scale(0.9); }
    }

    /* =========================================
       3. Layout & List Card (Glassmorphism)
       ========================================= */
    .wrap {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 80px 20px;
    }

    .list-card {
      position: relative;
      width: 100%;
      max-width: 800px;
      padding: 60px 50px;
      border-radius: 24px;
      
      background: linear-gradient(145deg, rgba(30, 25, 45, 0.6), rgba(15, 10, 20, 0.8));
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      box-shadow: 
        0 20px 40px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      
      transform: translateY(20px);
      opacity: 0;
      animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fadeUp {
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* =========================================
       4. List Header Typography
       ========================================= */
    .header-section {
      text-align: center;
      margin-bottom: 50px;
    }

    h1 {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #ffffff 0%, var(--purple-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    h1 .dot {
      color: var(--purple-main);
      -webkit-text-fill-color: var(--purple-main);
    }

    .header-desc {
      font-size: 1.1rem;
      color: var(--text-secondary);
    }

    /* =========================================
       5. Post List Styles
       ========================================= */
    .post-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 50px;
    }

    .post-item {
      display: block;
      padding: 30px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      overflow: hidden;
    }

    /* 호버 시 글 카드 슬라이드 및 발광 효과 */
    .post-item:hover {
      background: rgba(147, 51, 234, 0.08);
      border-color: rgba(147, 51, 234, 0.4);
      transform: translateX(8px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
    }

    .post-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: var(--purple-main);
      transform: scaleY(0);
      transition: transform 0.3s ease;
      transform-origin: bottom;
    }

    .post-item:hover::before {
      transform: scaleY(1);
    }

    .post-date {
      display: block;
      font-size: 0.9rem;
      color: var(--purple-light);
      font-weight: 600;
      margin-bottom: 8px;
    }

    .post-item h2 {
      color: var(--text-primary);
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 12px;
      transition: color 0.3s ease;
    }

    .post-item:hover h2 {
      color: #ffffff;
    }

    .post-excerpt {
      color: var(--text-secondary);
      font-size: 1rem;
      line-height: 1.6;
      /* 말줄임표 처리 (2줄) */
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* =========================================
       6. Back Button
       ========================================= */
    .actions {
      border-top: 1px solid var(--border-color);
      padding-top: 40px;
      text-align: center;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 32px;
      border-radius: 14px;
      font-size: 1.1rem;
      font-weight: 600;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.03);
      color: var(--text-primary);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }

    .btn-back:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    .btn-back svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
      transition: transform 0.3s ease;
    }

    .btn-back:hover svg {
      transform: translateX(-4px);
    }

    /* =========================================
       7. Responsive Design
       ========================================= */
    @media (max-width: 600px) {
      .list-card {
        padding: 40px 24px;
      }
      h1 {
        font-size: 2.2rem;
      }
      .post-item {
        padding: 24px 20px;
      }
      .post-item h2 {
        font-size: 1.3rem;
      }
      .btn-back {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  </div>

  <main class="wrap">

      </div>
