<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jiwoo Blog</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0f172a;
      color: #f8fafc;
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    .card {
      width: 100%;
      max-width: 800px;
      background-color: #1e293b;
      border-radius: 20px;
      padding: 50px 30px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin-top: 0;
      font-size: 48px;
      margin-bottom: 16px;
    }

    p {
      font-size: 20px;
      line-height: 1.7;
      color: #cbd5e1;
      margin-bottom: 30px;
    }

    a {
      display: inline-block;
      text-decoration: none;
      background-color: #38bdf8;
      color: #0f172a;
      font-weight: bold;
      padding: 14px 24px;
      border-radius: 12px;
    }

    a:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Jiwoo Blog</h1>
      <p>
        안녕하세요.<br>
        공부, 개발, 보안 기록을 정리하는 블로그입니다.
      </p>
      <a href="posts/first-post.html">첫 글 읽기</a>
      <a href="https://github.com/jiwoohaha" target="_blank">My GitHub</a>
    </div>
  </div>
</body>
</html>
