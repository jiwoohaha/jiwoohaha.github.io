<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jiwoo Blog - Cyber Dashboard</title>
  
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

  <style>
    /* =========================================
       1. Base Variables & Custom Cursor/Scrollbar
       ========================================= */
    :root {
      --bg-color: #050002; 
      --neon-pink: #ff00ff;
      --neon-pink-light: #ff66ff;
      --neon-pink-dark: #b300b3;
      --cyan-main: #0df;
      --matrix-green: #0f0;
      --text-primary: #ffffff;
      --text-secondary: #ffb3ff;
      --glow-spread: rgba(255, 0, 255, 0.4);
      --discord-color: #5865F2;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; cursor: none !important; }

    body {
      font-family: 'Pretendard', monospace, sans-serif;
      background-color: var(--bg-color); color: var(--text-primary);
      overflow-x: hidden; -webkit-font-smoothing: antialiased; line-height: 1.5;
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: var(--neon-pink-dark); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--neon-pink); }

    .custom-cursor {
      position: fixed; top: 0; left: 0; width: 24px; height: 24px;
      border: 1px solid var(--cyan-main); border-radius: 50%;
      pointer-events: none; z-index: 9999; transform: translate(-50%, -50%);
      transition: width 0.1s, height 0.1s, background 0.1s;
      box-shadow: 0 0 10px var(--cyan-main), inset 0 0 5px var(--cyan-main);
      display: flex; justify-content: center; align-items: center;
    }
    .custom-cursor::before, .custom-cursor::after {
      content: ''; position: absolute; background: var(--cyan-main);
    }
    .custom-cursor::before { width: 4px; height: 1px; left: -4px; box-shadow: 28px 0 0 var(--cyan-main); }
    .custom-cursor::after { width: 1px; height: 4px; top: -4px; box-shadow: 0 28px 0 var(--cyan-main); }
    .custom-cursor.click { width: 12px; height: 12px; background: rgba(0, 221, 255, 0.5); }

    /* =========================================
       2. Backgrounds: Orbs, Grid, Matrix, Scanlines
       ========================================= */
    .bg-container {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2; background-color: var(--bg-color);
      background-image: linear-gradient(rgba(255, 0, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 0, 255, 0.05) 1px, transparent 1px);
      background-size: 30px 30px;
    }
    .orb { position: absolute; border-radius: 50%; filter: blur(150px); opacity: 0.25; animation: float 20s infinite ease-in-out alternate; }
    .orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, var(--neon-pink), transparent 70%); top: -10%; left: -10%; }
    .orb-2 { width: 500px; height: 500px; background: radial-gradient(circle, var(--cyan-main), transparent 70%); bottom: -10%; right: -10%; animation-duration: 25s; }
    @keyframes float { 0% { transform: translate(0, 0) scale(1); } 50% { transform: translate(50px, 30px) scale(1.1); } 100% { transform: translate(-30px, -50px) scale(0.9); } }

    .scanlines {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9998;
      background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
      background-size: 100% 4px; pointer-events: none; opacity: 0.6;
    }

    #matrixCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; opacity: 0; transition: opacity 2s; pointer-events: none; }

    /* =========================================
       3. 3-Column Layout & Boxes
       ========================================= */
    .layout-wrapper { display: grid; grid-template-columns: 280px minmax(0, 1fr) 280px; gap: 30px; max-width: 1400px; margin: 0 auto; padding: 60px 20px; align-items: start; }
    .neon-box-wrapper {
      position: relative; width: 100%; border-radius: 20px; padding: 1px;
      background: linear-gradient(45deg, var(--neon-pink-dark), var(--cyan-main), var(--neon-pink), var(--neon-pink-dark));
      background-size: 400% 400%; animation: glowingBorder 8s ease infinite;
      box-shadow: 0 0 15px rgba(255, 0, 255, 0.15), inset 0 0 10px rgba(0, 221, 255, 0.2);
    }
    .neon-box {
      width: 100%; height: 100%; padding: 25px 20px; border-radius: 19px;
      background: rgba(10, 0, 5, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 102, 255, 0.1);
    }
    @keyframes glowingBorder { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .sidebar { position: sticky; top: 60px; display: flex; flex-direction: column; gap: 30px; }

    /* =========================================
       4. Left Sidebar (Profile, Glitch, Radar)
       ========================================= */
    .neon-avatar-container { width: 90px; height: 90px; margin: 0 auto 20px; display: flex; justify-content: center; align-items: center; }
    .neon-sign { width: 100%; height: 100%; filter: drop-shadow(0 0 5px #fff) drop-shadow(0 0 15px var(--neon-pink)) drop-shadow(0 0 30px var(--neon-pink)); animation: flicker 4s infinite alternate; }
    @keyframes flicker { 0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { filter: drop-shadow(0 0 5px #fff) drop-shadow(0 0 15px var(--neon-pink)); opacity: 1; } 20%, 24%, 55% { filter: drop-shadow(0 0 2px var(--neon-pink)); opacity: 0.8; } }
    
    .profile-info { text-align: center; margin-bottom: 20px; }
    .glitch-wrapper { position: relative; display: inline-block; }
    .glitch { font-size: 2rem; font-weight: 900; letter-spacing: 2px; margin-bottom: 5px; color: #fff; text-shadow: 0 0 10px var(--neon-pink); position: relative; }
    .glitch-wrapper:hover .glitch::before, .glitch-wrapper:hover .glitch::after { content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); }
    .glitch-wrapper:hover .glitch::before { left: 2px; text-shadow: -1px 0 red; clip: rect(24px, 550px, 90px, 0); animation: glitch-anim 2s infinite linear alternate-reverse; }
    .glitch-wrapper:hover .glitch::after { left: -2px; text-shadow: -1px 0 blue; clip: rect(85px, 550px, 140px, 0); animation: glitch-anim 2.5s infinite linear alternate-reverse; }
    @keyframes glitch-anim { 0% { clip: rect(10px, 9999px, 44px, 0); } 20% { clip: rect(65px, 9999px, 89px, 0); } 40% { clip: rect(12px, 9999px, 55px, 0); } 60% { clip: rect(78px, 9999px, 98px, 0); } 80% { clip: rect(23px, 9999px, 34px, 0); } 100% { clip: rect(56px, 9999px, 76px, 0); } }

    .profile-info p.short-desc { font-size: 0.85rem; color: var(--cyan-main); font-family: monospace; letter-spacing: 1px; }

    .radar-container { width: 100%; height: 120px; margin-bottom: 20px; position: relative; display: flex; justify-content: center; align-items: center; border-top: 1px solid rgba(255,0,255,0.2); padding-top: 15px; }
    .radar-svg { width: 100px; height: 100px; overflow: visible; }
    .radar-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 1; }
    .radar-web { fill: rgba(0, 221, 255, 0.3); stroke: var(--cyan-main); stroke-width: 1.5; filter: drop-shadow(0 0 5px var(--cyan-main)); animation: pulseRadar 3s infinite alternate; }
    .radar-label { fill: var(--text-secondary); font-size: 10px; font-family: 'Pretendard', sans-serif; }
    @keyframes pulseRadar { 0% { transform: scale(0.95); transform-origin: center; } 100% { transform: scale(1.05); transform-origin: center; } }

    .about-me-wrapper { margin-bottom: 25px; border-top: 1px solid rgba(255, 0, 255, 0.2); padding-top: 15px; }
    .btn-about { width: 100%; display: flex; justify-content: space-between; align-items: center; background: transparent; border: none; color: #fff; font-weight: 600; font-size: 0.9rem; padding: 5px; }
    .btn-about svg { width: 14px; height: 14px; transition: 0.3s; stroke: var(--cyan-main); }
    .btn-about.open svg { transform: rotate(180deg); }
    .about-content { max-height: 0; overflow: hidden; transition: 0.4s; opacity: 0; background: rgba(0, 0, 0, 0.5); font-size: 0.85rem; border-radius: 8px; }
    .about-content.show { max-height: 200px; opacity: 1; padding: 12px; margin-top: 10px; border-left: 2px solid var(--neon-pink); }
    .about-content .highlight { color: var(--cyan-main); }

    .social-links { display: flex; flex-direction: column; gap: 8px; margin-bottom: 25px; }
    .social-btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 8px; border-radius: 8px; font-size: 0.85rem; text-decoration: none; color: #fff; border: 1px solid rgba(255,0,255,0.3); transition: 0.3s; }
    .social-btn:hover { background: rgba(255,0,255,0.2); border-color: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink); }
    .social-btn.discord { border-color: rgba(88,101,242,0.5); }
    .social-btn.discord:hover { background: rgba(88,101,242,0.2); border-color: var(--discord-color); box-shadow: 0 0 10px var(--discord-color); }
    .social-btn svg { width: 16px; height: 16px; fill: currentColor; }

    .category-menu { display: flex; flex-direction: column; gap: 6px; }
    .category-menu h3 { font-size: 0.9rem; color: #fff; margin-bottom: 8px; font-family: 'Pretendard', sans-serif; border-bottom: 1px dashed rgba(255,255,255,0.2); padding-bottom: 5px; }
    .cat-btn { text-align: left; padding: 8px 12px; border-radius: 8px; font-size: 0.9rem; background: transparent; color: var(--text-secondary); border: 1px solid transparent; transition: 0.3s; font-family: 'Pretendard', sans-serif; }
    .cat-btn:hover { color: #fff; border-left: 3px solid var(--cyan-main); padding-left: 15px; background: rgba(0,221,255,0.05); }
    .cat-btn.active { color: #fff; border-left: 3px solid var(--neon-pink); padding-left: 15px; background: rgba(255,0,255,0.1); font-weight: bold; text-shadow: 0 0 5px var(--neon-pink); }

    /* =========================================
       5. Center Main (Post List & Scramble)
       ========================================= */
    .main-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 25px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,0,255,0.2); }
    .main-header h2 { font-size: 2rem; font-weight: 800; text-shadow: 0 0 8px var(--neon-pink); letter-spacing: 1px; font-family: 'Pretendard', sans-serif; }
    .main-header span { color: var(--cyan-main); font-family: 'Pretendard', sans-serif; font-size: 0.9rem; }

    .post-list { display: flex; flex-direction: column; gap: 15px; min-height: 300px; }
    .loading-msg { text-align: center; color: var(--cyan-main); font-family: 'Pretendard', sans-serif; padding: 40px 0; animation: blinker 1s linear infinite; }
    
    .post-item-wrapper { position: relative; }
    .post-item {
      display: block; padding: 20px; border-radius: 12px; background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05); text-decoration: none; position: relative; transition: 0.3s;
      transform-style: preserve-3d; transform: perspective(1000px);
    }
    .post-item:hover { background: rgba(255, 0, 255, 0.05); border-color: rgba(255, 0, 255, 0.3); box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5), 0 0 15px rgba(255,0,255,0.1); z-index: 2; }
    
    .post-meta { display: flex; gap: 10px; align-items: center; margin-bottom: 8px; font-family: 'Pretendard', sans-serif; }
    .post-cat-badge { font-size: 0.7rem; padding: 2px 8px; background: rgba(0, 221, 255, 0.1); color: var(--cyan-main); border-radius: 4px; border: 1px solid rgba(0,221,255,0.3); }
    .post-date { font-size: 0.8rem; color: #888; }
    
    .post-title { color: #fff; font-size: 1.3rem; font-weight: 700; margin-bottom: 6px; padding-right: 60px; font-family: 'Pretendard', sans-serif; }
    .post-excerpt { color: var(--text-secondary); font-size: 0.9rem; }
    
    .card-actions { position: absolute; top: 15px; right: 15px; display: flex; gap: 5px; z-index: 10; }
    .btn-icon { background: none; border: none; color: #888; padding: 5px; border-radius: 6px; transition: 0.2s; }
    .btn-icon:hover { background: rgba(255, 255, 255, 0.1); color: #fff; }
    .btn-icon.delete:hover { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
    .btn-icon svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; }

    /* =========================================
       6. Right Sidebar (Widgets)
       ========================================= */
    .widget { margin-bottom: 25px; }
    .widget h3 { font-size: 0.95rem; color: #fff; margin-bottom: 12px; font-family: 'Pretendard', sans-serif; border-bottom: 1px dashed rgba(255,255,255,0.2); padding-bottom: 5px; display: flex; align-items: center; gap: 6px;}
    .widget h3 svg { width: 14px; height: 14px; stroke: var(--cyan-main); }
    
    .search-box { width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(0,221,255,0.3); border-radius: 8px; color: var(--cyan-main); font-family: 'Pretendard', sans-serif; font-size: 0.85rem; transition: 0.3s; }
    .search-box:focus { outline: none; border-color: var(--cyan-main); box-shadow: 0 0 10px rgba(0,221,255,0.3); }
    .search-box::placeholder { color: #555; }

    .tag-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag { padding: 4px 10px; font-size: 0.75rem; background: transparent; color: #888; border: 1px solid #333; border-radius: 4px; transition: 0.3s; font-family: 'Pretendard', sans-serif; }
    .tag:hover { background: rgba(255,0,255,0.1); color: var(--neon-pink-light); border-color: var(--neon-pink); box-shadow: 0 0 8px var(--neon-pink); }

    .visualizer { display: flex; align-items: flex-end; gap: 3px; height: 40px; border-bottom: 1px solid #333; padding-bottom: 2px; }
    .bar { width: 12px; background: var(--neon-pink); opacity: 0.8; border-radius: 2px 2px 0 0; box-shadow: 0 0 5px var(--neon-pink); animation: bounceBar 1s infinite ease-in-out alternate; }
    .bar:nth-child(1) { animation-delay: 0.1s; height: 40%; background: var(--cyan-main); box-shadow: 0 0 5px var(--cyan-main); }
    .bar:nth-child(2) { animation-delay: 0.4s; height: 80%; }
    .bar:nth-child(3) { animation-delay: 0.2s; height: 60%; }
    .bar:nth-child(4) { animation-delay: 0.5s; height: 30%; background: var(--cyan-main); box-shadow: 0 0 5px var(--cyan-main); }
    .bar:nth-child(5) { animation-delay: 0.3s; height: 90%; }
    .bar:nth-child(6) { animation-delay: 0.6s; height: 50%; }
    .bar:nth-child(7) { animation-delay: 0.2s; height: 70%; background: var(--cyan-main); box-shadow: 0 0 5px var(--cyan-main); }
    @keyframes bounceBar { 0% { transform: scaleY(0.2); transform-origin: bottom; } 100% { transform: scaleY(1); transform-origin: bottom; } }

    .terminal-widget { background: #000; border: 1px solid #333; border-radius: 8px; padding: 10px; font-family: monospace; font-size: 0.8rem; color: var(--matrix-green); box-shadow: inset 0 0 15px rgba(0,255,0,0.05); height: 180px; display: flex; flex-direction: column; }
    .term-output { flex-grow: 1; overflow-y: auto; margin-bottom: 5px; scrollbar-width: none; }
    .term-output::-webkit-scrollbar { display: none; }
    .term-output p { margin-bottom: 3px; word-break: break-all; }
    .term-input-line { display: flex; align-items: center; border-top: 1px dashed #333; padding-top: 5px; }
    .term-input-line span { color: var(--neon-pink); margin-right: 5px; }
    .term-input { background: transparent; border: none; color: var(--text-primary); font-family: monospace; font-size: 0.8rem; flex-grow: 1; outline: none; }
    @keyframes blinker { 50% { opacity: 0; } }

    .btn-top { width: 100%; padding: 10px; background: transparent; border: 1px dashed #555; color: #888; border-radius: 8px; transition: 0.3s; font-family: 'Pretendard', sans-serif; font-size: 0.8rem; }
    .btn-top:hover { border-color: var(--cyan-main); color: var(--cyan-main); background: rgba(0,221,255,0.05); box-shadow: 0 0 10px rgba(0,221,255,0.2); }

    /* =========================================
       7. FAB & Modals
       ========================================= */
    .fab-write { position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px; border-radius: 50%; background: var(--cyan-main); color: #000; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 15px var(--cyan-main); z-index: 100; transition: 0.3s; }
    .fab-write:hover { transform: scale(1.1) rotate(90deg); box-shadow: 0 0 25px var(--cyan-main); background: var(--neon-pink); color: #fff; }
    .fab-write svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; }

    .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px); display: flex; justify-content: center; align-items: center; z-index: 999; opacity: 0; pointer-events: none; transition: 0.3s; }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .modal-content { background: #0a0005; border: 1px solid var(--neon-pink-dark); box-shadow: 0 0 40px rgba(255,0,255,0.2); border-radius: 16px; padding: 30px; width: 100%; max-width: 700px; transform: scale(0.95); transition: 0.3s; position: relative; max-height: 90vh; overflow-y: auto; text-align: left; }
    .modal-overlay.active .modal-content { transform: scale(1); }
    .modal-close { position: absolute; top: 15px; right: 15px; background: none; border: none; color: #888; font-size: 1.5rem; }
    .modal-close:hover { color: #fff; }
    .modal-title { font-size: 1.5rem; margin-bottom: 20px; font-weight: 700; color: #fff; border-left: 4px solid var(--cyan-main); padding-left: 10px; font-family: 'Pretendard', sans-serif; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; color: #aaa; font-size: 0.85rem; font-family: 'Pretendard', sans-serif; }
    .form-control { width: 100%; padding: 12px; background: #111; border: 1px solid #333; border-radius: 8px; color: #fff; font-family: inherit; font-size: 0.95rem; transition: 0.3s; }
    .form-control:focus { outline: none; border-color: var(--neon-pink); box-shadow: 0 0 10px rgba(255, 0, 255, 0.2); }
    select.form-control { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ffb3ff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 1rem center; background-size: 1em; }
    .btn-submit { width: 100%; padding: 14px; background: transparent; color: var(--cyan-main); border: 1px solid var(--cyan-main); border-radius: 8px; font-size: 1rem; font-weight: 700; transition: 0.3s; margin-top: 10px; font-family: 'Pretendard', sans-serif; }
    .btn-submit:hover { background: var(--cyan-main); color: #000; box-shadow: 0 0 15px var(--cyan-main); }
    .btn-danger { border-color: #ef4444; color: #ef4444; }
    .btn-danger:hover { background: #ef4444; color: #fff; box-shadow: 0 0 15px #ef4444; }
    .error-msg { color: #ef4444; font-size: 0.85rem; margin-top: 5px; display: none; }
    .modal-section { display: none; } .modal-section.active { display: block; }
    .ql-toolbar.ql-snow { background: #111; border: 1px solid #333; border-top-left-radius: 8px; border-top-right-radius: 8px; }
    .ql-container.ql-snow { border: 1px solid #333; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; font-family: inherit; font-size: 0.95rem; min-height: 250px; }
    .ql-snow .ql-stroke { stroke: #aaa; } .ql-snow .ql-fill { fill: #aaa; } .ql-snow .ql-picker { color: #aaa; }
    .ql-snow .ql-picker-options { background-color: #000; border-color: #333; } .ql-snow .ql-picker-item:hover { color: #fff; }
    .ql-editor.ql-blank::before { color: #555; font-style: normal; }

    @media (max-width: 1100px) { .layout-wrapper { grid-template-columns: 260px minmax(0, 1fr); } .sidebar-right { display: none; } }
    @media (max-width: 768px) { .layout-wrapper { grid-template-columns: 1fr; padding: 20px 10px; gap: 20px; } .sidebar { position: static; } .category-menu { flex-direction: row; overflow-x: auto; flex-wrap: nowrap; padding-bottom: 10px; } .cat-btn { white-space: nowrap; flex: 0 0 auto; } .sidebar-right { display: block; margin-top: 20px; } }
  </style>
</head>
<body>
  
  <canvas id="matrixCanvas"></canvas>
  <div class="bg-container"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
  <div class="scanlines"></div>

  <div class="layout-wrapper">
    
    <aside class="sidebar sidebar-left">
      <div class="neon-box-wrapper">
        <div class="neon-box">
          
          <div class="neon-avatar-container">
            <svg viewBox="0 0 100 100" class="neon-sign" xmlns="http://www.w3.org/2000/svg">
              <ellipse cx="50" cy="65" rx="46" ry="14" stroke="#ff66ff" stroke-width="2.5" fill="none" transform="rotate(-5 50 65)" />
              <circle cx="93" cy="60" r="2.5" fill="#ff66ff" stroke="#fff" stroke-width="1" />
              <path d="M50 2 Q50 15 62 15 Q50 15 50 28 Q50 15 38 15 Q50 15 50 2 Z" stroke="#ff00ff" stroke-width="2.5" fill="none" />
              <path d="M 22 55 C 18 40 10 28 10 28 C 22 32 35 35 42 35 C 47 34 53 34 58 35 C 65 35 78 32 90 28 C 90 28 82 40 78 55 C 86 68 76 85 50 85 C 24 85 14 68 22 55 Z" stroke="#ff00ff" stroke-width="3" fill="none" stroke-linejoin="round" />
              <circle cx="10" cy="28" r="2.5" fill="#ff00ff" />
              <circle cx="90" cy="28" r="2.5" fill="#ff00ff" />
              <path d="M 33 55 C 38 50 45 60 40 68 C 34 68 28 60 33 55 Z" stroke="#ff00ff" stroke-width="2.5" fill="none" stroke-linecap="round" />
              <path d="M 67 55 C 62 50 55 60 60 68 C 66 68 72 60 67 55 Z" stroke="#ff00ff" stroke-width="2.5" fill="none" stroke-linecap="round" />
            </svg>
          </div>

  <script>
    const cursor = document.createElement('div');
    cursor.classList.add('custom-cursor');
    document.body.appendChild(cursor);
    document.addEventListener('mousemove', e => { cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px'; });
    document.addEventListener('mousedown', () => cursor.classList.add('click'));
    document.addEventListener('mouseup', () => cursor.classList.remove('click'));

    const aboutToggleBtn = document.getElementById('aboutToggleBtn');
    const aboutContent = document.getElementById('aboutContent');
    aboutToggleBtn.addEventListener('click', () => { aboutToggleBtn.classList.toggle('open'); aboutContent.classList.toggle('show'); });

    const termInput = document.getElementById('termInput');
    const termOutput = document.getElementById('termOutput');
    const termContainer = document.getElementById('terminalContainer');
    function printTerm(html) { termOutput.innerHTML += `<p>${html}</p>`; termOutput.scrollTop = termOutput.scrollHeight; }
    termInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        const val = this.value.trim().toLowerCase();
        if(val) printTerm(`$ ${val}`);
        this.value = '';
        if (val === 'help') printTerm('- whoami<br>- ping<br>- matrix<br>- clear');
        else if (val === 'whoami') printTerm('ROOT: Jiwoohaha');
        else if (val === 'ping') printTerm('PONG. Latency: 1ms');
        else if (val === 'matrix') toggleMatrix();
        else if (val === 'clear') termOutput.innerHTML = '';
        else if (val !== '') printTerm(`알 수 없는 명령어입니다: ${val}`);
      }
    });

    const canvas = document.getElementById('matrixCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*'.split('');
    const fontSize = 14; const columns = canvas.width / fontSize;
    const drops = []; for (let x = 0; x < columns; x++) drops[x] = 1;
    let matrixInterval; let matrixOn = false;
    function drawMatrix() {
      ctx.fillStyle = 'rgba(5, 0, 2, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#0F0'; ctx.font = fontSize + 'px monospace';
      for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }
    function toggleMatrix() {
      matrixOn = !matrixOn;
      if(matrixOn) { canvas.style.opacity = 0.5; matrixInterval = setInterval(drawMatrix, 33); printTerm('매트릭스 프로토콜 가동.'); }
      else { canvas.style.opacity = 0; clearInterval(matrixInterval); printTerm('매트릭스 프로토콜 종료.'); }
    }
    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

    function scrambleText(element, finalStr) {
      const chars = '!<>-_\\\\/[]{}—=+*^?#_'; let iterations = 0;
      const interval = setInterval(() => {
        element.innerText = finalStr.split('').map((c, i) => {
          if(i < iterations) return c; return chars[Math.floor(Math.random() * chars.length)];
        }).join('');
        if(iterations >= finalStr.length) clearInterval(interval);
        iterations += 1/2; 
      }, 30);
    }

    var quill = new Quill('#editor-container', {
      theme: 'snow', placeholder: '내용 입력...',
      modules: { toolbar: [ [{ 'header': [1, 2, 3, false] }], ['bold', 'italic', 'underline', 'strike'], [{ 'color': [] }, { 'background': [] }], ['blockquote', 'code-block'], [{ 'list': 'ordered'}, { 'list': 'bullet' }], ['link', 'image', 'video'], ['clean'] ] }
    });

    const GITHUB_OWNER = 'jiwoohaha'; const GITHUB_REPO = 'jiwoohaha.github.io'; 
    let githubToken = ''; let currentAction = ''; let targetFileInfo = null; let isEditMode = false; let allPostsData = []; 
    const modal = document.getElementById('actionModal'); const closeBtn = document.getElementById('closeModalBtn');
    const sections = { auth: document.getElementById('authSection'), write: document.getElementById('writeSection'), delete: document.getElementById('deleteSection') };
    const pwInput = document.getElementById('adminPw'); const pwError = document.getElementById('pwError');

    function showSection(sectionName) { Object.values(sections).forEach(sec => sec.classList.remove('active')); sections[sectionName].classList.add('active'); }

    function openModal(action) {
      currentAction = action; modal.classList.add('active'); pwError.style.display = 'none';
      if (githubToken) { if (action === 'edit') fetchPostContentForEdit(); else showSection(action); } 
      else {
        showSection('auth');
        let authTitle = '관리자 인증';
        if(action === 'delete') authTitle = '삭제 권한 인증'; if(action === 'edit') authTitle = '수정 권한 인증'; if(action === 'write') authTitle = '작성 권한 인증';
        document.getElementById('authTitle').innerText = authTitle;
        pwInput.value = ''; setTimeout(() => pwInput.focus(), 100);
      }
    }

    closeBtn.addEventListener('click', () => { modal.classList.remove('active'); targetFileInfo = null; isEditMode = false; });
    document.getElementById('checkPwBtn').addEventListener('click', verifyToken);
    pwInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') verifyToken(); });

    function verifyToken() {
      const token = pwInput.value.trim();
      if (token.startsWith('ghp_') || token.startsWith('github_pat_')) { githubToken = token; if (currentAction === 'edit') fetchPostContentForEdit(); else showSection(currentAction); } 
      else { pwError.style.display = 'block'; pwInput.focus(); }
    }

    async function loadPostList() {
      const postListContainer = document.getElementById('postListContainer');
      try {
        // 캐시 무력화 (URL에 파라미터 추가)
        const response = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/posts?t=${new Date().getTime()}`);
        if (response.status === 404 || !response.ok) { postListContainer.innerHTML = '<div class="loading-msg">조건에 맞는 글이 없습니다.</div>'; document.getElementById('currentCategoryCount').innerText = "0개의 글"; return; }
        
        const files = await response.json();
        const htmlFiles = files.filter(file => file.name.endsWith('.html')).reverse();
        
        allPostsData = htmlFiles.map(file => {
          const namePart = file.name.replace('.html', '');
          const match = namePart.match(/^(\d{4}-\d{2}-\d{2})-\[(.+?)\]-(.+)$/);
          let date = '', category = '기타', title = namePart;
          if (match) { 
            date = match[1].replace(/-/g, '.'); 
            category = match[2].replace(/_/g, '/'); // 불러올 때는 _ 를 다시 / 로 복원
            title = match[3].replace(/-/g, ' '); 
          } 
          else { const oldMatch = namePart.match(/^(\d{4}-\d{2}-\d{2})-(.+)$/); if(oldMatch) { date = oldMatch[1].replace(/-/g, '.'); title = oldMatch[2].replace(/-/g, ' '); } }
          return { ...file, date, category, title };
        });

        document.getElementById('count-all').innerText = allPostsData.length;
        renderPosts('all');
      } catch (error) { postListContainer.innerHTML = `<div class="loading-msg" style="color: #ef4444;">글 목록을 불러올 수 없습니다.</div>`; }
    }

    function renderPosts(filterCategory, searchQuery = '') {
      const container = document.getElementById('postListContainer');
      container.innerHTML = ''; 

      let filteredPosts = filterCategory === 'all' ? allPostsData : allPostsData.filter(post => post.category === filterCategory);
      if(searchQuery) filteredPosts = filteredPosts.filter(post => post.title.toLowerCase().includes(searchQuery.toLowerCase()));

      const titleEl = document.getElementById('currentCategoryTitle');
      scrambleText(titleEl, filterCategory === 'all' ? '> 전체보기' : `> ${filterCategory}`);
      document.getElementById('currentCategoryCount').innerText = `${filteredPosts.length}개의 글을 찾았습니다`;

      if (filteredPosts.length === 0) { container.innerHTML = `<div class="loading-msg">조건에 맞는 글이 없습니다.</div>`; return; }

      filteredPosts.forEach((post, index) => {
        const postCard = `
          <div class="post-item-wrapper" style="animation: fadeUp 0.5s ease forwards; opacity:0; animation-delay: ${index*0.1}s">
            <a href="/${post.path}" class="post-item">
              <div class="post-meta"><span class="post-cat-badge">${post.category}</span><time class="post-date">${post.date}</time></div>
              <h3 class="post-title" data-title="${post.title}">${post.title}</h3>
              <p class="post-excerpt">자세히 보기 ></p>
            </a>
            <div class="card-actions">
              <button class="btn-icon edit btn-edit" title="수정" data-path="${post.path}" data-sha="${post.sha}" data-title="${post.title}" data-category="${post.category}"><svg viewBox="0 0 24 24"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg></button>
              <button class="btn-icon delete btn-delete" title="삭제" data-path="${post.path}" data-sha="${post.sha}" data-title="${post.title}"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg></button>
            </div>
          </div>
        `;
        container.innerHTML += postCard;
      });
      
      container.querySelectorAll('.post-title').forEach(el => scrambleText(el, el.getAttribute('data-title')));
      attachActionListeners(); 
      
      container.querySelectorAll('.post-item').forEach(item => {
        item.addEventListener('mousemove', e => {
          const rect = item.getBoundingClientRect();
          const x = e.clientX - rect.left; const y = e.clientY - rect.top;
          const xc = rect.width/2; const yc = rect.height/2;
          const dx = x - xc; const dy = y - yc;
          item.style.transform = `perspective(1000px) rotateY(${dx/30}deg) rotateX(${-dy/30}deg) translateZ(10px)`;
        });
        item.addEventListener('mouseleave', () => { item.style.transform = `perspective(1000px) rotateY(0) rotateX(0) translateZ(0)`; });
      });
    }

    document.querySelectorAll('.cat-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active')); e.target.classList.add('active');
        document.getElementById('searchInput').value = ''; renderPosts(e.target.getAttribute('data-filter'));
      });
    });

    document.getElementById('searchInput').addEventListener('keyup', (e) => {
      const activeCategory = document.querySelector('.cat-btn.active').getAttribute('data-filter'); renderPosts(activeCategory, e.target.value);
    });

    function attachActionListeners() {
      document.querySelectorAll('.btn-delete').forEach(btn => { btn.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); targetFileInfo = { path: btn.getAttribute('data-path'), sha: btn.getAttribute('data-sha'), title: btn.getAttribute('data-title') }; document.getElementById('deleteTargetTitle').innerText = `"${targetFileInfo.title}"`; openModal('delete'); }); });
      document.querySelectorAll('.btn-edit').forEach(btn => { btn.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); targetFileInfo = { path: btn.getAttribute('data-path'), sha: btn.getAttribute('data-sha'), title: btn.getAttribute('data-title'), category: btn.getAttribute('data-category') }; openModal('edit'); }); });
    }

    window.addEventListener('DOMContentLoaded', loadPostList);

    async function fetchPostContentForEdit() {
      if (!targetFileInfo) return; document.getElementById('authTitle').innerText = "불러오는 중... ⏳";
      try {
        const response = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${targetFileInfo.path}`, { headers: { 'Authorization': `Bearer ${githubToken}` } });
        if (!response.ok) throw new Error("파일 내용을 가져오지 못했습니다.");
        const data = await response.json(); const htmlString = decodeURIComponent(escape(atob(data.content))); const doc = new DOMParser().parseFromString(htmlString, 'text/html');
        document.getElementById('postTitle').value = doc.querySelector('h1') ? doc.querySelector('h1').innerText : targetFileInfo.title;
        quill.root.innerHTML = doc.querySelector('.ql-editor') ? doc.querySelector('.ql-editor').innerHTML : '';
        const catSelect = document.getElementById('postCategory');
        for(let i=0; i<catSelect.options.length; i++) { if(catSelect.options[i].value === targetFileInfo.category) { catSelect.selectedIndex = i; break; } }
        isEditMode = true; targetFileInfo.sha = data.sha; document.getElementById('writeTitle').innerText = "글 수정"; document.getElementById('submitPostBtn').innerText = "수정 완료"; showSection('write');
      } catch(error) { alert("오류: " + error.message); modal.classList.remove('active'); }
    }

    document.getElementById('openModalBtn').addEventListener('click', () => { isEditMode = false; document.getElementById('postTitle').value = ''; quill.setContents([]); document.getElementById('postCategory').selectedIndex = 0; document.getElementById('writeTitle').innerText = "새 글 작성"; document.getElementById('submitPostBtn').innerText = "발행하기"; openModal('write'); });

    document.getElementById('submitPostBtn').addEventListener('click', async () => {
      const title = document.getElementById('postTitle').value.trim(); const category = document.getElementById('postCategory').value; const content = quill.root.innerHTML;
      if (!title || content === '<p><br></p>') return alert("제목과 내용을 모두 입력해주세요.");
      
      let path = '', date = new Date().toISOString().split('T')[0], commitMessage = ''; 
      const safeTitle = title.replace(/ /g, '-');
      // 파일명에 들어갈 때는 안전하게 변환
      const safeCategory = category.replace(/\//g, '_'); 

      if (isEditMode) { path = targetFileInfo.path; commitMessage = `글 수정: [${category}] ${title}`; } 
      else { path = `posts/${date}-[${safeCategory}]-${safeTitle}.html`; commitMessage = `새 글 작성: [${category}] ${title}`; }

      const fullHtmlContent = `<!DOCTYPE html>\n<html lang="ko">\n<head>\n  <meta charset="UTF-8">\n  <meta name="viewport" content="width=device-width, initial-scale=1.0" />\n  <title>${title} - Jiwoo Blog</title>\n  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />\n  <link href="https://cdn.quilljs.com/1.3.6/quill.core.css" rel="stylesheet">\n  <style>\n    body { font-family: 'Pretendard', monospace, sans-serif; background: #050002; color: #fff; padding: 40px 20px; line-height: 1.8; margin: 0; }\n    .content-box { max-width: 800px; margin: 0 auto; background: rgba(10, 0, 5, 0.85); padding: 50px; border-radius: 20px; box-shadow: 0 0 30px rgba(255,0,255,0.1); border: 1px solid rgba(255, 102, 255, 0.2); }\n    .category-badge { display: inline-block; padding: 4px 12px; background: rgba(0, 221, 255, 0.1); color: #0df; border-radius: 4px; font-size: 0.9rem; font-weight: 700; margin-bottom: 10px; border: 1px solid rgba(0,221,255,0.3); font-family: monospace; }\n    time { color: #888; font-size: 0.95rem; margin-left: 10px; font-family: monospace; }\n    h1 { font-size: 2.5rem; margin-top: 10px; margin-bottom: 20px; color: #fff; text-shadow: 0 0 10px rgba(255,0,255,0.5); }\n    hr { border: 0; height: 1px; background: rgba(255,255,255,0.1); margin-bottom: 40px; }\n    .ql-editor { padding: 0; overflow-y: visible; color: #e4e4e7; font-family: 'Pretendard', sans-serif; }\n    .ql-editor img { max-width: 100%; height: auto; border-radius: 10px; margin: 20px 0; border: 1px solid rgba(255,255,255,0.1); }\n    .ql-video { width: 100%; height: 450px; border: none; border-radius: 10px; margin: 20px 0; }\n    .ql-editor pre.ql-syntax { background-color: #000; color: #0f0; padding: 20px; border-radius: 8px; overflow-x: auto; font-family: monospace; border: 1px solid #333; }\n    .ql-editor blockquote { border-left: 4px solid #0df; padding-left: 16px; margin: 20px 0; color: #ccc; font-style: italic; background: rgba(0,221,255,0.05); padding: 15px; border-radius: 0 8px 8px 0; }\n    a.btn-back { display: inline-flex; margin-top: 50px; padding: 10px 20px; background: transparent; color: #888; text-decoration: none; border-radius: 8px; font-weight: 600; transition: 0.3s; border: 1px dashed #555; font-family: monospace; }\n    a.btn-back:hover { background: rgba(0,221,255,0.05); border-color: #0df; color: #0df; box-shadow: 0 0 10px rgba(0,221,255,0.2); }\n    @media (max-width: 600px) { body { padding: 20px 10px; } .content-box { padding: 30px 20px; } .ql-video { height: 250px; } }\n  </style>\n</head>\n<body>\n  <div class="content-box">\n    <div><span class="category-badge">${category}</span><time>${date}</time></div>\n    <h1>${title}</h1><hr>\n    <div class="ql-editor">${content}</div><br>\n    <a href="/index.html" class="btn-back">< 전체 목록으로 돌아가기</a>\n  </div>\n</body>\n</html>`;

      try {
        const btn = document.getElementById('submitPostBtn'); btn.innerText = "업로드 중..."; btn.disabled = true;
        const response = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${path}`, { method: 'PUT', headers: { 'Authorization': `Bearer ${githubToken}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' }, body: JSON.stringify({ message: commitMessage, content: btoa(unescape(encodeURIComponent(fullHtmlContent))), ...(isEditMode && targetFileInfo ? {sha: targetFileInfo.sha} : {}) }) });
        if (response.ok) { alert(`성공! 1~2분 뒤 반영됩니다.`); modal.classList.remove('active'); document.getElementById('postTitle').value = ''; quill.setContents([]); isEditMode = false; } else throw await response.json();
      } catch (error) { alert(`실패: ${error.message}`); } finally { const btn = document.getElementById('submitPostBtn'); btn.innerText = isEditMode ? "수정 완료" : "발행하기"; btn.disabled = false; }
    });

    document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
      if (!targetFileInfo) return;
      try {
        const btn = document.getElementById('confirmDeleteBtn'); btn.innerText = "삭제 중..."; btn.disabled = true;
        const response = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${targetFileInfo.path}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${githubToken}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' }, body: JSON.stringify({ message: `글 삭제: ${targetFileInfo.title}`, sha: targetFileInfo.sha }) });
        if (response.ok) { alert("삭제 완료! 1~2분 뒤 반영됩니다."); modal.classList.remove('active'); targetFileInfo = null; } else throw await response.json();
      } catch (error) { alert(`실패: ${error.message}`); } finally { const btn = document.getElementById('confirmDeleteBtn'); btn.innerText = "영구 삭제"; btn.disabled = false; }
    });
  </script>
</body>
</html>
