<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jiwoo Blog</title>
  
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

  <style>
    /* =========================================
       1. Reset & Base Variables
       ========================================= */
    :root {
      --bg-color: #050505;
      --surface-color: rgba(20, 15, 30, 0.4);
      --border-color: rgba(139, 92, 246, 0.15);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      
      --purple-light: #c084fc;
      --purple-main: #9333ea;
      --purple-dark: #3b0764;
      --cyan-main: #06b6d4;
      
      --glow-spread: rgba(147, 51, 234, 0.4);
      --discord-color: #5865F2;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-primary);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
    }

    /* =========================================
       2. Animated Background (3 Orbs for richer color)
       ========================================= */
    .bg-container {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
      background-color: var(--bg-color);
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    .orb {
      position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.5;
      animation: float 20s infinite ease-in-out alternate;
    }

    .orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, var(--purple-main), transparent 70%); top: -10%; left: -10%; animation-delay: 0s; }
    .orb-2 { width: 500px; height: 500px; background: radial-gradient(circle, var(--cyan-main), transparent 70%); bottom: -10%; right: -10%; animation-duration: 25s; }
    .orb-3 { width: 400px; height: 400px; background: radial-gradient(circle, #ec4899, transparent 70%); top: 40%; left: 40%; animation-duration: 18s; animation-direction: alternate-reverse; opacity: 0.3; }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(50px, 30px) scale(1.1); }
      100% { transform: translate(-30px, -50px) scale(0.9); }
    }

    /* =========================================
       3. Layout & Animated Glowing Card
       ========================================= */
    .wrap {
      min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 40px 20px;
    }

    /* 카드를 감싸는 래퍼 (글로우 애니메이션용) */
    .card-wrapper {
      position: relative;
      width: 100%; max-width: 640px;
      border-radius: 26px;
      padding: 2px; /* 테두리 두께 */
      background: linear-gradient(45deg, var(--purple-main), var(--cyan-main), #ec4899, var(--purple-main));
      background-size: 400% 400%;
      animation: glowingBorder 8s ease infinite;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(147, 51, 234, 0.3);
      transform: translateY(20px); opacity: 0;
      animation: glowingBorder 8s ease infinite, fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes glowingBorder {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .card {
      width: 100%; height: 100%;
      padding: 60px 40px; border-radius: 24px;
      background: linear-gradient(145deg, rgba(20, 15, 30, 0.9), rgba(10, 10, 15, 0.95));
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      text-align: center;
    }

    @keyframes fadeUp {
      to { transform: translateY(0); opacity: 1; }
    }

    /* =========================================
       4. Avatar & Typography
       ========================================= */
    .avatar {
      width: 100px; height: 100px; margin: 0 auto 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--cyan-main), var(--purple-main));
      padding: 4px; /* 테두리 굵기 */
      box-shadow: 0 0 20px rgba(6, 182, 212, 0.4);
    }

    .avatar-inner {
      width: 100%; height: 100%;
      background-color: #0f172a; border-radius: 50%;
      display: flex; justify-content: center; align-items: center;
      font-size: 2.5rem;
    }

    h1 {
      font-size: 3.5rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 16px;
      background: linear-gradient(135deg, #ffffff 0%, var(--purple-light) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    h1 .dot { color: var(--cyan-main); -webkit-text-fill-color: var(--cyan-main); }

    .badges {
      display: flex; gap: 10px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap;
    }

    .badge {
      padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 600;
      background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
      letter-spacing: 0.5px;
    }

    .badge.sec { color: var(--cyan-main); border-color: rgba(6, 182, 212, 0.3); background: rgba(6, 182, 212, 0.05); }
    .badge.dev { color: var(--purple-light); border-color: rgba(192, 132, 252, 0.3); background: rgba(192, 132, 252, 0.05); }

    p.desc {
      font-size: 1.15rem; line-height: 1.8; color: var(--text-secondary); margin-bottom: 48px; word-break: keep-all;
    }
    p.desc span.highlight { color: var(--text-primary); font-weight: 600; }

    /* =========================================
       5. Buttons (Actions)
       ========================================= */
    .actions {
      display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
    }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      padding: 16px 28px; border-radius: 14px; font-size: 1.05rem; font-weight: 600;
      text-decoration: none; transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    /* 글 목록 버튼 */
    .btn-primary {
      background: linear-gradient(135deg, var(--purple-main) 0%, #7e22ce 100%); color: #ffffff;
      box-shadow: 0 4px 15px var(--glow-spread); border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .btn-primary:hover { box-shadow: 0 8px 25px rgba(147, 51, 234, 0.6); transform: translateY(-2px); filter: brightness(1.1); }

    /* GitHub 버튼 */
    .btn-github {
      background: rgba(255, 255, 255, 0.05); color: var(--text-primary);
      border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
    }
    .btn-github:hover { background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.3); transform: translateY(-2px); }

    /* Discord 버튼 */
    .btn-discord {
      background: rgba(88, 101, 242, 0.15); color: #fff;
      border: 1px solid rgba(88, 101, 242, 0.3); backdrop-filter: blur(10px);
      cursor: pointer;
    }
    .btn-discord:hover {
      background: var(--discord-color); border-color: var(--discord-color);
      box-shadow: 0 8px 25px rgba(88, 101, 242, 0.4); transform: translateY(-2px);
    }

    .btn svg { width: 22px; height: 22px; fill: currentColor; transition: transform 0.3s ease; }
    .btn-primary:hover svg { transform: translateX(4px); }

    /* =========================================
       6. Responsive Design
       ========================================= */
    @media (max-width: 600px) {
      .card { padding: 50px 24px; }
      h1 { font-size: 2.8rem; }
      .actions { flex-direction: column; width: 100%; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>
  
  <div class="bg-container">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <main class="wrap">
    <div class="card-wrapper">
      <article class="card">
        
        <div class="avatar">
          <div class="avatar-inner">
            👨‍💻
          </div>
        </div>

        <h1>Jiwoo Blog<span class="dot">.</span></h1>
        
        <div class="badges">
          <span class="badge sec">Security</span>
          <span class="badge dev">Development</span>
          <span class="badge">Tech Log</span>
        </div>
        
        <p class="desc">
          안녕하세요.<br>
          <span class="highlight">보안과 개발, 그리고 공부 기록</span>을 정리하는 블로그입니다.
        </p>

        </div>
      </article>
    </div>
  </main>
  
</body>
</html>
