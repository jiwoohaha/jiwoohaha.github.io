<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jiwoo Blog - Neon Edition</title>
  
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

  <style>
    /* =========================================
       1. Reset & Neon Base Variables
       ========================================= */
    :root {
      --bg-color: #0a0005; 
      --neon-pink: #ff00ff;
      --neon-pink-light: #ff66ff;
      --neon-pink-dark: #b300b3;
      --text-primary: #ffffff;
      --text-secondary: #ffb3ff;
      --glow-spread: rgba(255, 0, 255, 0.4);
      --discord-color: #5865F2;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg-color); color: var(--text-primary);
      overflow-x: hidden; -webkit-font-smoothing: antialiased; line-height: 1.5;
    }

    /* =========================================
       2. Animated Background
       ========================================= */
    .bg-container {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background-color: var(--bg-color);
      background-image: linear-gradient(rgba(255, 0, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 0, 255, 0.05) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .orb { position: absolute; border-radius: 50%; filter: blur(150px); opacity: 0.4; animation: float 20s infinite ease-in-out alternate; }
    .orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, var(--neon-pink), transparent 70%); top: -10%; left: -10%; }
    .orb-2 { width: 500px; height: 500px; background: radial-gradient(circle, #ff0066, transparent 70%); bottom: -10%; right: -10%; animation-duration: 25s; }
    @keyframes float { 0% { transform: translate(0, 0) scale(1); } 50% { transform: translate(50px, 30px) scale(1.1); } 100% { transform: translate(-30px, -50px) scale(0.9); } }

    /* =========================================
       3. Layout & Glowing Card
       ========================================= */
    .wrap { min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 40px 20px; }
    .card-wrapper {
      position: relative; width: 100%; max-width: 800px; border-radius: 26px; padding: 2px; margin-top: 40px;
      background: linear-gradient(45deg, var(--neon-pink-dark), var(--neon-pink-light), #ff007f, var(--neon-pink-dark));
      background-size: 400% 400%; animation: glowingBorder 8s ease infinite, fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      box-shadow: 0 0 20px rgba(255, 0, 255, 0.3), 0 0 50px rgba(255, 0, 255, 0.2), inset 0 0 20px rgba(255, 0, 255, 0.5);
      transform: translateY(20px); opacity: 0;
    }
    @keyframes glowingBorder { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .card {
      width: 100%; height: 100%; padding: 50px 40px; border-radius: 24px;
      background: linear-gradient(145deg, rgba(15, 0, 10, 0.8), rgba(25, 0, 15, 0.9));
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); text-align: center; border: 1px solid rgba(255, 102, 255, 0.2);
    }
    @keyframes fadeUp { to { transform: translateY(0); opacity: 1; } }

    /* =========================================
       4. Avatar & Typography
       ========================================= */
    .neon-avatar-container { width: 120px; height: 120px; margin: 0 auto 20px; display: flex; justify-content: center; align-items: center; }
    .neon-sign { width: 100%; height: 100%; filter: drop-shadow(0 0 5px #fff) drop-shadow(0 0 15px var(--neon-pink)) drop-shadow(0 0 30px var(--neon-pink)); animation: flicker 4s infinite alternate; }
    @keyframes flicker { 0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { filter: drop-shadow(0 0 5px #fff) drop-shadow(0 0 15px var(--neon-pink)) drop-shadow(0 0 30px var(--neon-pink)); opacity: 1; } 20%, 24%, 55% { filter: drop-shadow(0 0 2px var(--neon-pink)); opacity: 0.8; } }
    
    h1 { font-size: 3rem; font-weight: 800; letter-spacing: 2px; margin-bottom: 10px; color: #fff; text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px var(--neon-pink), 0 0 40px var(--neon-pink); }
    h1 .dot { color: var(--neon-pink-light); }
    
    /* 소셜 버튼 상단 배치 */
    .social-links { display: flex; gap: 12px; justify-content: center; margin-bottom: 40px; }
    .social-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 12px; font-size: 0.9rem; font-weight: 600; text-decoration: none; color: #fff; border: 1px solid var(--neon-pink); background: transparent; transition: 0.3s; cursor: pointer; box-shadow: 0 0 10px rgba(255, 0, 255, 0.2); }
    .social-btn:hover { background: var(--neon-pink); box-shadow: 0 0 20px var(--neon-pink); transform: translateY(-2px); }
    .social-btn.discord { border-color: var(--discord-color); box-shadow: 0 0 10px rgba(88, 101, 242, 0.2); }
    .social-btn.discord:hover { background: var(--discord-color); box-shadow: 0 0 20px var(--discord-color); }
    .social-btn svg { width: 16px; height: 16px; fill: currentColor; }

    /* =========================================
       5. 카테고리 네비게이션 (신규)
       ========================================= */
    .category-menu {
      display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 30px;
      padding-bottom: 20px; border-bottom: 1px solid rgba(255, 102, 255, 0.2);
    }
    .cat-btn {
      padding: 8px 16px; border-radius: 20px; font-size: 0.95rem; font-weight: 600;
      background: rgba(255, 255, 255, 0.03); color: var(--text-secondary); border: 1px solid rgba(255, 255, 255, 0.1);
      cursor: pointer; transition: all 0.3s ease; letter-spacing: 0.5px;
    }
    .cat-btn:hover { background: rgba(255, 0, 255, 0.1); color: #fff; border-color: var(--neon-pink-light); }
    .cat-btn.active {
      background: var(--neon-pink); color: #fff; border-color: var(--neon-pink);
      box-shadow: 0 0 15px var(--neon-pink), inset 0 0 5px rgba(255, 255, 255, 0.5);
    }

    /* =========================================
       6. Post List & Cards
       ========================================= */
    .post-list { display: flex; flex-direction: column; gap: 20px; text-align: left; min-height: 100px; }
    .loading-msg { text-align: center; color: var(--text-secondary); padding: 20px 0; }
    
    .post-item-wrapper { position: relative; }
    .post-item {
      display: block; padding: 25px; border-radius: 16px; background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05); text-decoration: none; position: relative; overflow: hidden; transition: 0.3s;
    }
    .post-item:hover { background: rgba(255, 0, 255, 0.08); border-color: rgba(255, 0, 255, 0.4); transform: translateX(8px); box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4); }
    .post-item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--neon-pink); transform: scaleY(0); transition: 0.3s; transform-origin: bottom; }
    .post-item:hover::before { transform: scaleY(1); }

    .post-meta { display: flex; gap: 10px; align-items: center; margin-bottom: 8px; }
    .post-cat-badge { font-size: 0.75rem; padding: 3px 8px; background: rgba(255, 0, 255, 0.15); color: var(--neon-pink-light); border-radius: 10px; font-weight: 700; border: 1px solid rgba(255,0,255,0.3); }
    .post-date { font-size: 0.85rem; color: var(--text-secondary); }
    
    .post-item h2 { color: #fff; font-size: 1.4rem; font-weight: 700; margin-bottom: 10px; padding-right: 80px; }
    
    .card-actions { position: absolute; top: 20px; right: 15px; display: flex; gap: 5px; z-index: 10; }
    .btn-icon { background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 6px; border-radius: 8px; transition: 0.2s; display: flex; }
    .btn-icon:hover { background: rgba(255, 255, 255, 0.1); color: #fff; }
    .btn-icon.delete:hover { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
    .btn-icon svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* =========================================
       7. FAB & Modals
       ========================================= */
    .fab-write { position: fixed; bottom: 40px; right: 40px; width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, var(--neon-pink) 0%, var(--neon-pink-dark) 100%); color: white; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 15px var(--glow-spread); cursor: pointer; z-index: 100; transition: 0.3s; border: 1px solid rgba(255, 255, 255, 0.2); }
    .fab-write:hover { transform: scale(1.1) translateY(-5px); box-shadow: 0 8px 25px rgba(255, 0, 255, 0.6); }
    .fab-write svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; z-index: 999; opacity: 0; pointer-events: none; transition: 0.3s; }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .modal-content { background: linear-gradient(145deg, #15000a, #0a0005); border: 1px solid var(--neon-pink-dark); box-shadow: 0 0 50px rgba(255,0,255,0.2); border-radius: 20px; padding: 40px; width: 100%; max-width: 700px; transform: translateY(20px); transition: 0.3s; position: relative; max-height: 90vh; overflow-y: auto; text-align: left; }
    .modal-overlay.active .modal-content { transform: translateY(0); }
    .modal-close { position: absolute; top: 20px; right: 20px; background: none; border: none; color: var(--text-secondary); font-size: 1.5rem; cursor: pointer; }
    .modal-close:hover { color: #fff; }

    .modal-title { font-size: 1.8rem; margin-bottom: 20px; font-weight: 700; color: #fff; text-shadow: 0 0 10px var(--neon-pink); }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; color: var(--text-secondary); font-size: 0.95rem; }
    
    /* 입력창 및 셀렉트 박스 */
    .form-control { width: 100%; padding: 14px 16px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,0,255,0.2); border-radius: 10px; color: #fff; font-family: inherit; font-size: 1rem; transition: 0.3s; }
    .form-control:focus { outline: none; border-color: var(--neon-pink); box-shadow: 0 0 10px rgba(255, 0, 255, 0.3); }
    select.form-control { cursor: pointer; appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ffb3ff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 1rem center; background-size: 1em; }
    select.form-control option { background: #15000a; color: #fff; }

    .btn-submit { width: 100%; padding: 16px; background: transparent; color: #fff; border: 2px solid var(--neon-pink); box-shadow: 0 0 15px rgba(255,0,255,0.3); border-radius: 10px; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; }
    .btn-submit:hover { background: var(--neon-pink); box-shadow: 0 0 25px var(--neon-pink); }
    .btn-danger { border-color: #ef4444; box-shadow: 0 0 15px rgba(239,68,68,0.3); }
    .btn-danger:hover { background: #ef4444; box-shadow: 0 0 25px #ef4444; }

    .error-msg { color: #ef4444; font-size: 0.9rem; margin-top: 8px; display: none; }
    .modal-section { display: none; }
    .modal-section.active { display: block; }

    /* Quill Editor Custom */
    .ql-toolbar.ql-snow { background: rgba(255,0,255,0.05); border: 1px solid rgba(255,0,255,0.2); border-top-left-radius: 10px; border-top-right-radius: 10px; }
    .ql-container.ql-snow { border: 1px solid rgba(255,0,255,0.2); border-bottom-left-radius: 10px; border-bottom-right-radius: 10px; font-family: inherit; font-size: 1rem; min-height: 250px; }
    .ql-snow .ql-stroke { stroke: #ffb3ff; } .ql-snow .ql-fill { fill: #ffb3ff; } .ql-snow .ql-picker { color: #ffb3ff; }
    .ql-snow .ql-picker-options { background-color: #15000a; border-color: rgba(255,0,255,0.2); }
    .ql-snow .ql-picker-item:hover, .ql-snow .ql-picker-label:hover { color: #fff; }
    .ql-editor.ql-blank::before { color: rgba(255,179,255,0.5); font-style: normal; }

    @media (max-width: 600px) {
      .card { padding: 40px 20px; }
      h1 { font-size: 2.2rem; }
      .category-menu { justify-content: flex-start; overflow-x: auto; flex-wrap: nowrap; padding-bottom: 10px; }
      .cat-btn { white-space: nowrap; }
    }
  </style>
</head>
<body>
  
  <div class="bg-container">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <main class="wrap">
    <div class="card-wrapper">
      <article class="card">
        
        <div class="neon-avatar-container">
          <svg viewBox="0 0 100 100" class="neon-sign" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="50" cy="65" rx="46" ry="14" stroke="#ff66ff" stroke-width="2.5" fill="none" transform="rotate(-5 50 65)" />
            <circle cx="93" cy="60" r="2.5" fill="#ff66ff" stroke="#fff" stroke-width="1" />
            <path d="M50 2 Q50 15 62 15 Q50 15 50 28 Q50 15 38 15 Q50 15 50 2 Z" stroke="#ff00ff" stroke-width="2.5" fill="none" />
            <path d="M 22 55 C 18 40 10 28 10 28 C 22 32 35 35 42 35 C 47 34 53 34 58 35 C 65 35 78 32 90 28 C 90 28 82 40 78 55 C 86 68 76 85 50 85 C 24 85 14 68 22 55 Z" stroke="#ff00ff" stroke-width="3" fill="none" stroke-linejoin="round" />
            <circle cx="10" cy="28" r="2.5" fill="#ff00ff" />
            <circle cx="90" cy="28" r="2.5" fill="#ff00ff" />
            <path d="M 33 55 C 38 50 45 60 40 68 C 34 68 28 60 33 55 Z" stroke="#ff00ff" stroke-width="2.5" fill="none" stroke-linecap="round" />
            <path d="M 67 55 C 62 50 55 60 60 68 C 66 68 72 60 67 55 Z" stroke="#ff00ff" stroke-width="2.5" fill="none" stroke-linecap="round" />
          </svg>
        </div>

        <h1>Jiwoo Blog<span class="dot">.</span></h1>
        
        <div class="social-links">
          <a href="https://github.com/jiwoohaha" target="_blank" rel="noopener noreferrer" class="social-btn">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.464-1.11-1.464-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.161 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
            GitHub
          </a>
          <a href="https://discord.com/users/603818932427554827" target="_blank" rel="noopener noreferrer" class="social-btn discord" title="Discord 프로필 보기">
            <svg viewBox="0 0 24 24"><path d="M20.317 4.3698a19.7913 19.7913 0 00-4.8851-1.5152.0741.0741 0 00-.0785.0371c-.211.3753-.4447.8648-.6083 1.2495-1.8447-.2762-3.68-.2762-5.4868 0-.1636-.3933-.4058-.8742-.6177-1.2495a.077.077 0 00-.0785-.037 19.7363 19.7363 0 00-4.8852 1.515.0699.0699 0 00-.0321.0277C.5334 9.0458-.319 13.5799.0992 18.0578a.0824.0824 0 00.0312.0561c2.0528 1.5076 4.0413 2.4228 5.9929 3.0294a.0777.0777 0 00.0842-.0276c.4616-.6304.8731-1.2952 1.226-1.9942a.076.076 0 00-.0416-.1057c-.6528-.2476-1.2743-.5495-1.8722-.8923a.077.077 0 01-.0076-.1277c.1258-.0943.2517-.1923.3718-.2914a.0743.0743 0 01.0776-.0105c3.9278 1.7933 8.18 1.7933 12.0614 0a.0739.0739 0 01.0785.0095c.1202.099.246.1981.3728.2924a.077.077 0 01-.0066.1276 12.2986 12.2986 0 01-1.873.8914.0766.0766 0 00-.0407.1067c.3604.698.7719 1.3628 1.225 1.9932a.076.076 0 00.0842.0286c1.961-.6067 3.9495-1.5219 6.0023-3.0294a.077.077 0 00.0313-.0552c.5004-5.177-.8382-9.6739-3.5485-13.6604a.061.061 0 00-.0312-.0286zM8.02 15.3312c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9555-2.4189 2.157-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.9555 2.4189-2.1569 2.4189zm7.9748 0c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9554-2.4189 2.1569-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.946 2.4189-2.1568 2.4189Z"/></svg>
            smartsecurity
          </a>
        </div>

        <div class="category-menu" id="categoryMenu">
          <button class="cat-btn active" data-filter="all">전체보기</button>
          <button class="cat-btn" data-filter="개발">개발</button>
          <button class="cat-btn" data-filter="CTF/Wargame">CTF/Wargame</button>
          <button class="cat-btn" data-filter="Bug Bounty">Bug Bounty</button>
          <button class="cat-btn" data-filter="블로그/기술컨퍼런스">블로그/기술컨퍼런스</button>
          <button class="cat-btn" data-filter="논문/컨퍼런스">논문/컨퍼런스</button>
          <button class="cat-btn" data-filter="공모전/자격증">공모전/자격증</button>
        </div>

        <div class="post-list" id="postListContainer">
          <div class="loading-msg">글 목록을 불러오는 중입니다... ⏳</div>
        </div>

      </article>
    </div>
  </main>

  <div class="fab-write" id="openModalBtn" title="새 글 작성하기">
    <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
  </div>

  <div class="modal-overlay" id="actionModal">
    <div class="modal-content">
      <button class="modal-close" id="closeModalBtn">&times;</button>
      
      <div id="authSection" class="modal-section">
        <h2 class="modal-title" id="authTitle">관리자 인증</h2>
        <div class="form-group">
          <label for="adminPw">작업을 수행하려면 GitHub Token을 입력하세요.</label>
          <input type="password" id="adminPw" class="form-control" placeholder="ghp_ 또는 github_pat_ 로 시작">
          <div class="error-msg" id="pwError">유효한 GitHub 토큰 형식이 아닙니다.</div>
        </div>
        <button class="btn-submit" id="checkPwBtn">인증 확인</button>
      </div>

      <div id="writeSection" class="modal-section">
        <h2 class="modal-title" id="writeTitle">새 글 작성</h2>
        
        <div class="form-group">
          <label for="postCategory">카테고리</label>
          <select id="postCategory" class="form-control">
            <option value="개발">개발</option>
            <option value="CTF/Wargame">CTF/Wargame</option>
            <option value="Bug Bounty">Bug Bounty</option>
            <option value="블로그/기술컨퍼런스">블로그/기술컨퍼런스</option>
            <option value="논문/컨퍼런스">논문/컨퍼런스</option>
            <option value="공모전/자격증">공모전/자격증</option>
            <option value="기타">기타 (미분류)</option>
          </select>
        </div>

        <div class="form-group">
          <label for="postTitle">제목</label>
          <input type="text" id="postTitle" class="form-control" placeholder="제목을 입력하세요">
        </div>
        
        <div class="form-group">
          <label>내용</label>
          <div id="editor-container"></div>
        </div>
        
        <button class="btn-submit" id="submitPostBtn">GitHub에 발행하기</button>
      </div>

      <div id="deleteSection" class="modal-section">
        <h2 class="modal-title" style="color: #ef4444;">글 삭제</h2>
        <p style="color: var(--text-secondary); margin-bottom: 20px;">
          정말로 이 글을 삭제하시겠습니까?<br>이 작업은 되돌릴 수 없습니다.
        </p>
        <p id="deleteTargetTitle" style="font-weight: bold; margin-bottom: 30px;"></p>
        <button class="btn-submit btn-danger" id="confirmDeleteBtn">영구 삭제하기</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
  
  <script>
    // ==========================================
    // 0. Quill 에디터 초기화
    // ==========================================
    var quill = new Quill('#editor-container', {
      theme: 'snow',
      placeholder: '사진, 동영상 링크, 코드를 마음껏 넣어보세요...',
      modules: {
        toolbar: [
          [{ 'header': [1, 2, 3, false] }],
          ['bold', 'italic', 'underline', 'strike'],
          [{ 'color': [] }, { 'background': [] }],
          ['blockquote', 'code-block'],
          [{ 'list': 'ordered'}, { 'list': 'bullet' }],
          ['link', 'image', 'video'],
          ['clean']
        ]
      }
    });

    // ==========================================
    // 1. 공통 설정 및 상태 관리
    // ==========================================
    const GITHUB_OWNER = 'jiwoohaha'; 
    const GITHUB_REPO = 'jiwoohaha.github.io'; 

    let githubToken = ''; 
    let currentAction = ''; 
    let targetFileInfo = null; 
    let isEditMode = false; 
    let allPostsData = []; // 전체 글 데이터를 보관할 배열 (카테고리 필터링 용도)

    const modal = document.getElementById('actionModal');
    const closeBtn = document.getElementById('closeModalBtn');
    const sections = { auth: document.getElementById('authSection'), write: document.getElementById('writeSection'), delete: document.getElementById('deleteSection') };
    const pwInput = document.getElementById('adminPw');
    const pwError = document.getElementById('pwError');

    function showSection(sectionName) {
      Object.values(sections).forEach(sec => sec.classList.remove('active'));
      sections[sectionName].classList.add('active');
    }

    function openModal(action) {
      currentAction = action;
      modal.classList.add('active');
      pwError.style.display = 'none';

      if (githubToken) {
        if (action === 'edit') fetchPostContentForEdit();
        else showSection(action);
      } else {
        showSection('auth');
        let authTitle = '인증 필요';
        if(action === 'delete') authTitle = '삭제 권한 인증';
        if(action === 'edit') authTitle = '수정 권한 인증';
        if(action === 'write') authTitle = '작성 권한 인증';
        document.getElementById('authTitle').innerText = authTitle;
        pwInput.value = '';
        setTimeout(() => pwInput.focus(), 100);
      }
    }

    closeBtn.addEventListener('click', () => { modal.classList.remove('active'); targetFileInfo = null; isEditMode = false; });
    document.getElementById('checkPwBtn').addEventListener('click', verifyToken);
    pwInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') verifyToken(); });

    function verifyToken() {
      const token = pwInput.value.trim();
      if (token.startsWith('ghp_') || token.startsWith('github_pat_')) {
        githubToken = token; 
        if (currentAction === 'edit') fetchPostContentForEdit();
        else showSection(currentAction); 
      } else {
        pwError.style.display = 'block'; pwInput.focus();
      }
    }

    // ==========================================
    // 2. 글 목록 불러오기 및 카테고리 필터링
    // ==========================================
    async function loadPostList() {
      const postListContainer = document.getElementById('postListContainer');
      try {
        const response = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/posts`);
        
        if (response.status === 404) {
          postListContainer.innerHTML = '<div class="loading-msg">아직 작성된 글이 없습니다. 우측 하단의 ✏️ 버튼으로 첫 글을 작성해보세요!</div>';
          return;
        }
        if (!response.ok) throw new Error("API 요청 실패");
        
        const files = await response.json();
        
        // 확장자가 html인 파일만 필터링 후 역순(최신순) 정렬
        const htmlFiles = files.filter(file => file.name.endsWith('.html')).reverse();
          
        if (htmlFiles.length === 0) {
          postListContainer.innerHTML = '<div class="loading-msg">아직 작성된 글이 없습니다. 우측 하단의 ✏️ 버튼으로 첫 글을 작성해보세요!</div>';
          return;
        }

        // 전체 데이터를 파싱하여 allPostsData 배열에 저장
        allPostsData = htmlFiles.map(file => {
          const namePart = file.name.replace('.html', '');
          // 정규식 업데이트: 날짜-[카테고리]-제목 형식 추출
          // 예: 2026-04-12-[개발]-파이썬-기초
          const match = namePart.match(/^(\d{4}-\d{2}-\d{2})-\[(.+?)\]-(.+)$/);
          
          let date = '';
          let category = '기타';
          let title = namePart;

          if (match) {
            date = match[1].replace(/-/g, '.'); 
            category = match[2];
            title = match[3].replace(/-/g, ' '); 
          } else {
            // 옛날 방식(카테고리 없는) 파일들 호환성 유지
            const oldMatch = namePart.match(/^(\d{4}-\d{2}-\d{2})-(.+)$/);
            if(oldMatch) {
              date = oldMatch[1].replace(/-/g, '.');
              title = oldMatch[2].replace(/-/g, ' ');
            }
          }

          return { ...file, date, category, title };
        });

        // 최초 로딩 시 '전체' 렌더링
        renderPosts('all');
        
      } catch (error) {
        postListContainer.innerHTML = `<div class="loading-msg" style="color: #ef4444;">${error.message || "글 목록을 불러올 수 없습니다."}</div>`;
      }
    }

    // 화면에 글 카드를 그려주는 함수
    function renderPosts(filterCategory) {
      const container = document.getElementById('postListContainer');
      container.innerHTML = ''; // 기존 목록 비우기

      // 필터링 적용
      const filteredPosts = filterCategory === 'all' 
        ? allPostsData 
        : allPostsData.filter(post => post.category === filterCategory);

      if (filteredPosts.length === 0) {
        container.innerHTML = `<div class="loading-msg">'${filterCategory}' 카테고리에 아직 작성된 글이 없습니다.</div>`;
        return;
      }

      filteredPosts.forEach(post => {
        const postCard = `
          <div class="post-item-wrapper">
            <a href="/${post.path}" class="post-item">
              <div class="post-meta">
                <span class="post-cat-badge">${post.category}</span>
                <time class="post-date">${post.date}</time>
              </div>
              <h2>${post.title}</h2>
              <p class="post-excerpt">클릭하여 글 내용을 확인해보세요.</p>
            </a>
            <div class="card-actions">
              <button class="btn-icon edit btn-edit" title="글 수정" data-path="${post.path}" data-sha="${post.sha}" data-title="${post.title}" data-category="${post.category}">
                <svg viewBox="0 0 24 24"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
              </button>
              <button class="btn-icon delete btn-delete" title="글 삭제" data-path="${post.path}" data-sha="${post.sha}" data-title="${post.title}">
                <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
              </button>
            </div>
          </div>
        `;
        container.innerHTML += postCard;
      });

      attachActionListeners(); // 새로 그려진 버튼들에 이벤트 다시 연결
    }

    // 카테고리 탭 클릭 이벤트
    document.querySelectorAll('.cat-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        // 기존 active 클래스 제거
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        // 클릭된 버튼에 active 부여
        e.target.classList.add('active');
        // 해당 카테고리로 렌더링
        renderPosts(e.target.getAttribute('data-filter'));
      });
    });

    // 수정/삭제 버튼 이벤트 연결 함수
    function attachActionListeners() {
      document.querySelectorAll('.btn-delete').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault(); e.stopPropagation(); 
          targetFileInfo = { path: btn.getAttribute('data-path'), sha: btn.getAttribute('data-sha'), title: btn.getAttribute('data-title') };
          document.getElementById('deleteTargetTitle').innerText = `"${targetFileInfo.title}"`;
          openModal('delete');
        });
      });

      document.querySelectorAll('.btn-edit').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault(); e.stopPropagation(); 
          targetFileInfo = { 
            path: btn.getAttribute('data-path'), 
            sha: btn.getAttribute('data-sha'), 
            title: btn.getAttribute('data-title'),
            category: btn.getAttribute('data-category')
          };
          openModal('edit');
        });
      });
    }

    window.addEventListener('DOMContentLoaded', loadPostList);

    // ==========================================
    // 3. 기존 글 내용 불러오기 (수정 모드)
    // ==========================================
    async function fetchPostContentForEdit() {
      if (!targetFileInfo) return;
      document.getElementById('authTitle').innerText = "내용 불러오는 중... ⏳";
      
      try {
        const response = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${targetFileInfo.path}`, {
          headers: { 'Authorization': `Bearer ${githubToken}` }
        });
        if (!response.ok) throw new Error("파일 내용을 가져오지 못했습니다.");
        
        const data = await response.json();
        const htmlString = decodeURIComponent(escape(atob(data.content)));
        
        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlString, 'text/html');
        
        const titleElement = doc.querySelector('h1');
        const bodyElement = doc.querySelector('.ql-editor');
        
        // 폼 채우기
        document.getElementById('postTitle').value = titleElement ? titleElement.innerText : targetFileInfo.title;
        quill.root.innerHTML = bodyElement ? bodyElement.innerHTML : '';
        
        // 카테고리 셀렉트 박스 세팅
        const categorySelect = document.getElementById('postCategory');
        for(let i=0; i < categorySelect.options.length; i++) {
          if(categorySelect.options[i].value === targetFileInfo.category) {
            categorySelect.selectedIndex = i;
            break;
          }
        }

        isEditMode = true;
        targetFileInfo.sha = data.sha; 
        
        document.getElementById('writeTitle').innerText = "글 수정";
        document.getElementById('submitPostBtn').innerText = "수정 완료";
        showSection('write');

      } catch(error) {
        alert("글 내용을 불러오는데 실패했습니다: " + error.message);
        modal.classList.remove('active');
      }
    }


    // ==========================================
    // 4. 글 작성 / 수정 발행 로직
    // ==========================================
    document.getElementById('openModalBtn').addEventListener('click', () => {
      isEditMode = false;
      document.getElementById('postTitle').value = '';
      quill.setContents([]);
      document.getElementById('postCategory').selectedIndex = 0; // 카테고리 초기화
      document.getElementById('writeTitle').innerText = "새 글 작성";
      document.getElementById('submitPostBtn').innerText = "GitHub에 발행하기";
      openModal('write');
    });

    document.getElementById('submitPostBtn').addEventListener('click', async () => {
      const title = document.getElementById('postTitle').value.trim();
      const category = document.getElementById('postCategory').value;
      const content = quill.root.innerHTML;

      if (!title || content === '<p><br></p>') return alert("제목과 내용을 모두 입력해주세요.");

      let path = '';
      let date = new Date().toISOString().split('T')[0];
      let commitMessage = '';

      // 파일명에 카테고리 정보를 삽입! (예: 2026-04-12-[개발]-제목.html)
      const safeTitle = title.replace(/ /g, '-');

      if (isEditMode) {
        // 기존 파일명 구조를 버리고, 카테고리가 바뀌었을 수 있으므로 새 규칙으로 덮어씀.
        // *참고: GitHub API의 PUT 메서드는 path가 같으면 업데이트, 다르면 새로 생성합니다.
        // 완벽한 구현을 위해서는 이전 path를 삭제하고 새 path를 생성해야 하지만, 
        // 편의상 기존 글 수정 시에는 파일명(path)을 그대로 유지하고 내용/카테고리만 수정하도록 합니다.
        path = targetFileInfo.path; 
        commitMessage = `글 수정: [${category}] ${title}`;
      } else {
        path = `posts/${date}-[${category}]-${safeTitle}.html`; 
        commitMessage = `새 글 작성: [${category}] ${title}`;
      }

      // 글 본문 템플릿
      const fullHtmlContent = `<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>${title} - Jiwoo Blog</title>
  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link href="https://cdn.quilljs.com/1.3.6/quill.core.css" rel="stylesheet">
  <style>
    body { font-family: 'Pretendard', sans-serif; background: #0a0005; color: #f8fafc; padding: 40px 20px; line-height: 1.8; margin: 0; }
    .content-box { max-width: 800px; margin: 0 auto; background: linear-gradient(145deg, rgba(15, 0, 10, 0.8), rgba(25, 0, 15, 0.9)); padding: 50px; border-radius: 20px; box-shadow: 0 0 30px rgba(255,0,255,0.1); border: 1px solid rgba(255, 102, 255, 0.2); }
    .category-badge { display: inline-block; padding: 4px 12px; background: rgba(255,0,255,0.15); color: #ff66ff; border-radius: 20px; font-size: 0.9rem; font-weight: 700; margin-bottom: 10px; border: 1px solid rgba(255,0,255,0.3); }
    time { color: #a1a1aa; font-size: 0.95rem; margin-left: 10px; }
    h1 { font-size: 2.5rem; margin-top: 10px; margin-bottom: 20px; color: #fff; text-shadow: 0 0 10px rgba(255,0,255,0.5); }
    hr { border: 0; height: 1px; background: rgba(255,255,255,0.1); margin-bottom: 40px; }
    .ql-editor { padding: 0; overflow-y: visible; color: #e4e4e7; }
    .ql-editor img { max-width: 100%; height: auto; border-radius: 10px; margin: 20px 0; border: 1px solid rgba(255,255,255,0.1); }
    .ql-video { width: 100%; height: 450px; border: none; border-radius: 10px; margin: 20px 0; }
    .ql-editor pre.ql-syntax { background-color: #000; color: #ffb3ff; padding: 20px; border-radius: 8px; overflow-x: auto; font-family: monospace; border: 1px solid rgba(255,0,255,0.2); }
    .ql-editor blockquote { border-left: 4px solid #ff00ff; padding-left: 16px; margin: 20px 0; color: #ffb3ff; font-style: italic; background: rgba(255,0,255,0.05); padding: 15px; border-radius: 0 8px 8px 0; }
    a.btn-back { display: inline-flex; margin-top: 50px; padding: 12px 24px; background: transparent; color: #fff; text-decoration: none; border-radius: 12px; font-weight: 600; transition: 0.3s; border: 2px solid #ff00ff; box-shadow: 0 0 10px rgba(255,0,255,0.2); }
    a.btn-back:hover { background: #ff00ff; box-shadow: 0 0 20px #ff00ff; transform: translateY(-2px); }
    @media (max-width: 600px) { body { padding: 20px 10px; } .content-box { padding: 30px 20px; } .ql-video { height: 250px; } }
  </style>
</head>
<body>
  <div class="content-box">
    <div>
      <span class="category-badge">${category}</span>
      <time>${date}</time>
    </div>
    <h1>${title}</h1>
    <hr>
    <div class="ql-editor">${content}</div>
    <br>
    <a href="/index.html" class="btn-back">목록으로 돌아가기</a>
  </div>
</body>
</html>`;

      const base64Content = btoa(unescape(encodeURIComponent(fullHtmlContent)));

      const requestBody = { message: commitMessage, content: base64Content };
      if (isEditMode && targetFileInfo) requestBody.sha = targetFileInfo.sha;

      try {
        const btn = document.getElementById('submitPostBtn');
        btn.innerText = "커밋 중..."; btn.disabled = true;

        const response = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${path}`, {
          method: 'PUT',
          headers: { 'Authorization': `Bearer ${githubToken}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
          body: JSON.stringify(requestBody)
        });

        if (response.ok) {
          alert(`글이 성공적으로 ${isEditMode ? '수정' : '발행'}되었습니다! 1~2분 뒤 새로고침 하세요.`);
          modal.classList.remove('active');
          document.getElementById('postTitle').value = '';
          quill.setContents([]); 
          isEditMode = false;
        } else throw await response.json();
      } catch (error) {
        alert(`업로드 실패: ${error.message}`);
      } finally {
        const btn = document.getElementById('submitPostBtn');
        btn.innerText = isEditMode ? "수정 완료" : "GitHub에 발행하기"; btn.disabled = false;
      }
    });

    // ==========================================
    // 5. 글 삭제 로직 
    // ==========================================
    document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
      if (!targetFileInfo) return;
      try {
        const btn = document.getElementById('confirmDeleteBtn');
        btn.innerText = "삭제 중..."; btn.disabled = true;

        const response = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${targetFileInfo.path}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${githubToken}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: `글 삭제: ${targetFileInfo.title}`, sha: targetFileInfo.sha })
        });

        if (response.ok) {
          alert("글이 삭제되었습니다! 1~2분 뒤 새로고침 하세요.");
          modal.classList.remove('active'); targetFileInfo = null;
        } else throw await response.json();
      } catch (error) {
        alert(`삭제 실패: ${error.message}`);
      } finally {
        const btn = document.getElementById('confirmDeleteBtn');
        btn.innerText = "영구 삭제하기"; btn.disabled = false;
      }
    });
  </script>

</body>
</html>
