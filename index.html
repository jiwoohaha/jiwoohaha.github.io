<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jiwoo Blog - Neon Edition</title>
  
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

  <style>
    /* =========================================
       1. Reset & Neon Base Variables
       ========================================= */
    :root {
      /* 사진 기반의 핫핑크 네온 팔레트 */
      --bg-color: #0a0005; /* 약간의 핑크빛이 도는 딥 다크 */
      --neon-pink: #ff00ff;
      --neon-pink-light: #ff66ff;
      --neon-pink-dark: #b300b3;
      --text-primary: #ffffff;
      --text-secondary: #ffb3ff;
      
      --glow-spread: rgba(255, 0, 255, 0.4);
      --discord-color: #5865F2;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-primary);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
    }

    /* =========================================
       2. Animated Background (Neon Atmosphere)
       ========================================= */
    .bg-container {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
      background-color: var(--bg-color);
      /* 벽돌/타일 텍스처 대신 은은한 그리드로 네온사인 배경 연출 */
      background-image: 
        linear-gradient(rgba(255, 0, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 0, 255, 0.05) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* 방 안을 가득 채우는 네온 불빛 효과 (Orbs) */
    .orb {
      position: absolute; border-radius: 50%; filter: blur(150px); opacity: 0.4;
      animation: float 20s infinite ease-in-out alternate;
    }
    .orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, var(--neon-pink), transparent 70%); top: -10%; left: -10%; }
    .orb-2 { width: 500px; height: 500px; background: radial-gradient(circle, #ff0066, transparent 70%); bottom: -10%; right: -10%; animation-duration: 25s; }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(50px, 30px) scale(1.1); }
      100% { transform: translate(-30px, -50px) scale(0.9); }
    }

    /* =========================================
       3. Layout & Neon Glowing Card
       ========================================= */
    .wrap {
      min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 40px 20px;
    }

    .card-wrapper {
      position: relative; width: 100%; max-width: 640px; border-radius: 26px; padding: 2px;
      background: linear-gradient(45deg, var(--neon-pink-dark), var(--neon-pink-light), #ff007f, var(--neon-pink-dark));
      background-size: 400% 400%;
      animation: glowingBorder 8s ease infinite, fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      /* 뿜어져 나오는 네온 박스 쉐도우 */
      box-shadow: 0 0 20px rgba(255, 0, 255, 0.3), 0 0 50px rgba(255, 0, 255, 0.2), inset 0 0 20px rgba(255, 0, 255, 0.5);
      transform: translateY(20px); opacity: 0;
    }

    @keyframes glowingBorder {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .card {
      width: 100%; height: 100%; padding: 60px 40px; border-radius: 24px;
      background: linear-gradient(145deg, rgba(15, 0, 10, 0.8), rgba(25, 0, 15, 0.9));
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      text-align: center;
      /* 내부 네온 반사광 */
      border: 1px solid rgba(255, 102, 255, 0.2);
    }

    @keyframes fadeUp { to { transform: translateY(0); opacity: 1; } }

    /* =========================================
       4. Neon Sign Avatar (Kuromi/Skull Design)
       ========================================= */
    .neon-avatar-container {
      width: 180px; height: 180px; margin: 0 auto 30px;
      display: flex; justify-content: center; align-items: center;
    }

    /* SVG 패스에 네온 빛 번짐 효과 적용 */
    .neon-sign {
      width: 100%; height: 100%;
      filter: drop-shadow(0 0 5px #fff) drop-shadow(0 0 15px var(--neon-pink)) drop-shadow(0 0 30px var(--neon-pink));
      animation: flicker 4s infinite alternate;
    }

    /* 네온사인 미세 깜빡임 애니메이션 */
    @keyframes flicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { filter: drop-shadow(0 0 5px #fff) drop-shadow(0 0 15px var(--neon-pink)) drop-shadow(0 0 30px var(--neon-pink)); opacity: 1; }
      20%, 24%, 55% { filter: drop-shadow(0 0 2px var(--neon-pink)); opacity: 0.8; }
    }

    /* =========================================
       5. Typography
       ========================================= */
    h1 {
      font-size: 3.5rem; font-weight: 800; letter-spacing: 2px; margin-bottom: 16px;
      color: #fff;
      /* 리얼 네온 텍스트 쉐도우 */
      text-shadow: 
        0 0 5px #fff, 0 0 10px #fff, 
        0 0 20px var(--neon-pink), 0 0 40px var(--neon-pink), 
        0 0 80px var(--neon-pink);
    }

    h1 .dot { color: var(--neon-pink-light); }

    .badges { display: flex; gap: 10px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap; }
    
    .badge {
      padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 600;
      background: transparent; color: #fff;
      border: 1px solid var(--neon-pink);
      box-shadow: 0 0 10px rgba(255, 0, 255, 0.4), inset 0 0 5px rgba(255, 0, 255, 0.4);
      letter-spacing: 1px; text-transform: uppercase;
    }

    p.desc { font-size: 1.15rem; line-height: 1.8; color: var(--text-secondary); margin-bottom: 48px; word-break: keep-all; }
    p.desc span.highlight { color: #fff; font-weight: 600; text-shadow: 0 0 8px var(--neon-pink); }

    /* =========================================
       6. Neon Buttons
       ========================================= */
    .actions { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      padding: 16px 28px; border-radius: 14px; font-size: 1.05rem; font-weight: 700;
      text-decoration: none; transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      background: transparent; color: #fff;
      border: 2px solid var(--neon-pink);
      box-shadow: 0 0 15px rgba(255, 0, 255, 0.3), inset 0 0 10px rgba(255, 0, 255, 0.2);
    }

    .btn:hover {
      background: var(--neon-pink); color: #fff;
      box-shadow: 0 0 25px var(--neon-pink), 0 0 50px var(--neon-pink);
      transform: translateY(-3px);
    }

    /* Discord 특화 버튼 */
    .btn-discord { border-color: var(--discord-color); box-shadow: 0 0 15px rgba(88, 101, 242, 0.4), inset 0 0 10px rgba(88, 101, 242, 0.3); cursor: pointer; }
    .btn-discord:hover { background: var(--discord-color); box-shadow: 0 0 25px var(--discord-color), 0 0 50px var(--discord-color); }

    .btn svg { width: 22px; height: 22px; fill: currentColor; transition: transform 0.3s ease; }
    .btn:hover svg { transform: scale(1.1); }

    /* =========================================
       7. Responsive Design
       ========================================= */
    @media (max-width: 600px) {
      .card { padding: 50px 24px; }
      h1 { font-size: 2.8rem; }
      .actions { flex-direction: column; width: 100%; }
      .btn { width: 100%; }
    }
  </style>
</head>
