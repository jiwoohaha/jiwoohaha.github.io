<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jiwoohaha Blog - Cyber Dashboard</title>
  
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

  <style>
    /* =========================================
       1. Base & Neon Variables
       ========================================= */
    :root {
      --bg-color: #050002; 
      --neon-pink: #ff00ff;
      --neon-pink-light: #ff66ff;
      --neon-pink-dark: #b300b3;
      --cyan-main: #0df;
      --matrix-green: #0f0;
      --text-primary: #ffffff;
      --text-secondary: #ffb3ff;
      --discord-color: #5865F2;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; cursor: none !important; }

    body {
      font-family: 'Pretendard', monospace, sans-serif;
      background-color: var(--bg-color); color: var(--text-primary);
      overflow-x: hidden; -webkit-font-smoothing: antialiased; line-height: 1.5;
    }

    /* 커스텀 스크롤바 */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--neon-pink-dark); border-radius: 10px; }

    /* 커스텀 커서 */
    .custom-cursor {
      position: fixed; top: 0; left: 0; width: 20px; height: 20px;
      border: 1px solid var(--cyan-main); border-radius: 50%;
      pointer-events: none; z-index: 9999; transform: translate(-50%, -50%);
      box-shadow: 0 0 10px var(--cyan-main); display: flex; justify-content: center; align-items: center;
    }
    .custom-cursor::before { content: ''; width: 4px; height: 4px; background: var(--neon-pink); border-radius: 50%; }

    /* =========================================
       2. Background & Overlays
       ========================================= */
    .bg-container {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2;
      background-image: linear-gradient(rgba(255, 0, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 0, 255, 0.03) 1px, transparent 1px);
      background-size: 30px 30px;
    }
    .orb { position: absolute; border-radius: 50%; filter: blur(150px); opacity: 0.2; animation: float 20s infinite ease-in-out alternate; }
    .orb-1 { width: 500px; height: 500px; background: var(--neon-pink); top: -10%; left: -10%; }
    .orb-2 { width: 400px; height: 400px; background: var(--cyan-main); bottom: -10%; right: -10%; }
    @keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(50px, 50px); } }

    .scanlines { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9998; background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.1) 50%); background-size: 100% 4px; pointer-events: none; }
    #matrixCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; opacity: 0; transition: 2s; }

    /* =========================================
       3. Layout Construction
       ========================================= */
    .layout-wrapper { display: grid; grid-template-columns: 280px minmax(0, 1fr) 280px; gap: 25px; max-width: 1440px; margin: 0 auto; padding: 40px 20px; align-items: start; }
    
    .neon-box-wrapper {
      position: relative; border-radius: 15px; padding: 1px;
      background: linear-gradient(45deg, var(--neon-pink-dark), var(--cyan-main), var(--neon-pink-dark));
      background-size: 400% 400%; animation: glowing 8s linear infinite;
    }
    .neon-box { width: 100%; height: 100%; padding: 25px; border-radius: 14px; background: rgba(10, 0, 5, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
    @keyframes glowing { 0% { background-position: 0% 50%; } 100% { background-position: 400% 50%; } }

    /* =========================================
       4. Sidebars & Profile
       ========================================= */
    .sidebar { position: sticky; top: 40px; display: flex; flex-direction: column; gap: 25px; }

    .neon-avatar-container { width: 80px; height: 80px; margin: 0 auto 15px; }
    .neon-sign { width: 100%; height: 100%; filter: drop-shadow(0 0 10px var(--neon-pink)); animation: flicker 4s infinite; }
    @keyframes flicker { 0%, 100% { opacity: 1; } 50% { opacity: 0.9; } }

    .glitch-wrapper { text-align: center; margin-bottom: 10px; }
    .glitch { font-size: 1.8rem; font-weight: 900; color: #fff; text-shadow: 0 0 10px var(--neon-pink); position: relative; }
    .glitch::after { content: 'Jiwoohaha.'; position: absolute; left: 0; top: 0; width: 100%; height: 100%; opacity: 0; }
    .glitch-wrapper:hover .glitch::after { opacity: 1; animation: glitch-anim 0.3s infinite; color: var(--cyan-main); left: 2px; }
    @keyframes glitch-anim { 0% { clip: rect(10px, 999px, 20px, 0); } 100% { clip: rect(30px, 999px, 40px, 0); } }

    .short-desc { text-align: center; color: var(--cyan-main); font-size: 0.8rem; margin-bottom: 20px; }

    /* Radar Chart */
    .radar-container { padding: 15px 0; border-top: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: center; }
    .radar-svg { width: 120px; height: 120px; }
    .radar-label { fill: #aaa; font-size: 10px; }
    .radar-web { fill: rgba(0, 221, 255, 0.2); stroke: var(--cyan-main); stroke-width: 1; }

    /* About Me */
    .btn-about { width: 100%; display: flex; justify-content: space-between; border: none; background: transparent; color: #fff; font-weight: bold; cursor: pointer; padding: 10px 0; border-top: 1px solid rgba(255,255,255,0.1); }
    .about-content { max-height: 0; overflow: hidden; transition: 0.4s; font-size: 0.85rem; color: #ccc; line-height: 1.6; }
    .about-content.show { max-height: 200px; padding: 10px 0; }

    .social-links { display: flex; flex-direction: column; gap: 8px; margin-top: 20px; }
    .social-btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px; border-radius: 8px; font-size: 0.85rem; text-decoration: none; color: #fff; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
    .social-btn:hover { background: var(--neon-pink); box-shadow: 0 0 15px var(--neon-pink); border-color: var(--neon-pink); }
    .social-btn.discord { border-color: var(--discord-color); color: var(--discord-color); }
    .social-btn.discord:hover { background: var(--discord-color); color: #fff; }

    .category-menu { display: flex; flex-direction: column; gap: 5px; margin-top: 20px; }
    .category-menu h3 { font-size: 0.85rem; color: #666; margin-bottom: 10px; }
    .cat-btn { text-align: left; padding: 10px; border-radius: 8px; font-size: 0.9rem; background: transparent; border: 1px solid transparent; color: #aaa; transition: 0.3s; }
    .cat-btn:hover { color: #fff; background: rgba(255,255,255,0.05); }
    .cat-btn.active { color: #fff; background: rgba(255,0,255,0.1); border-left: 3px solid var(--neon-pink); font-weight: bold; }

    /* =========================================
       5. Main Feed
       ========================================= */
    .main-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
    .main-header h2 { font-size: 1.8rem; text-shadow: 0 0 10px var(--neon-pink); }
    
    .post-list { display: flex; flex-direction: column; gap: 15px; }
    .post-item { display: block; padding: 20px; border-radius: 12px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); text-decoration: none; position: relative; transition: 0.3s; }
    .post-item:hover { border-color: var(--neon-pink); background: rgba(255,0,255,0.03); transform: translateY(-3px); }
    .post-cat-badge { font-size: 0.7rem; padding: 2px 8px; background: rgba(0,221,255,0.1); color: var(--cyan-main); border: 1px solid var(--cyan-main); border-radius: 4px; margin-right: 10px; }
    .post-title { font-size: 1.2rem; color: #fff; font-weight: bold; margin-top: 8px; }
    
    .card-actions { position: absolute; top: 15px; right: 15px; display: flex; gap: 8px; }
    .btn-icon { background: none; border: none; color: #555; cursor: pointer; }
    .btn-icon:hover { color: #fff; }

    /* =========================================
       6. Right Widgets
       ========================================= */
    .widget h3 { font-size: 0.9rem; color: var(--cyan-main); margin-bottom: 15px; font-family: monospace; }
    .search-box { width: 100%; padding: 10px; background: #000; border: 1px solid #333; border-radius: 8px; color: var(--cyan-main); font-size: 0.85rem; }
    
    .visualizer { display: flex; align-items: flex-end; gap: 2px; height: 30px; }
    .bar { flex: 1; background: var(--neon-pink); animation: v-bounce 1s infinite alternate; }
    @keyframes v-bounce { 0% { height: 20%; } 100% { height: 100%; } }

    .terminal-widget { background: #000; border: 1px solid #222; border-radius: 8px; padding: 10px; font-family: monospace; font-size: 0.75rem; color: var(--matrix-green); height: 150px; display: flex; flex-direction: column; }
    .term-output { flex: 1; overflow-y: auto; margin-bottom: 5px; }
    .term-input-line { display: flex; border-top: 1px solid #222; padding-top: 5px; }
    .term-input { background: transparent; border: none; color: #fff; outline: none; width: 100%; font-size: 0.75rem; }

    /* =========================================
       7. FAB & Modals
       ========================================= */
    .fab-write { position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px; border-radius: 50%; background: var(--cyan-main); display: flex; justify-content: center; align-items: center; box-shadow: 0 0 15px var(--cyan-main); z-index: 100; }
    
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); z-index: 999; display: none; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
    .modal-overlay.active { display: flex; }
    .modal-content { background: #0a0005; border: 1px solid var(--neon-pink); padding: 30px; border-radius: 15px; width: 90%; max-width: 700px; max-height: 90vh; overflow-y: auto; }
    
    .form-control { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; margin-bottom: 15px; }
    .btn-submit { width: 100%; padding: 15px; background: var(--neon-pink); border: none; color: #fff; font-weight: bold; border-radius: 8px; cursor: pointer; }

    @media (max-width: 1000px) { .layout-wrapper { grid-template-columns: 1fr; } .sidebar-right { display: none; } }
  </style>
</head>
<body>

  <div class="bg-container"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
  <canvas id="matrixCanvas"></canvas>
  <div class="scanlines"></div>

  <div class="layout-wrapper">
    
    <aside class="sidebar">
      <div class="neon-box-wrapper">
        <div class="neon-box">
          <div class="neon-avatar-container">
            <svg viewBox="0 0 100 100" class="neon-sign">
              <ellipse cx="50" cy="65" rx="46" ry="14" stroke="#ff66ff" stroke-width="2" fill="none" transform="rotate(-5 50 65)" />
              <circle cx="93" cy="60" r="2" fill="#ff66ff" />
              <path d="M50 2 Q50 15 62 15 Q50 15 50 28 Q50 15 38 15 Q50 15 50 2" stroke="#ff00ff" stroke-width="2" fill="none" />
              <path d="M 22 55 C 18 40 10 28 10 28 C 22 32 35 35 42 35 C 47 34 53 34 58 35 C 65 35 78 32 90 28 C 90 28 82 40 78 55 C 86 68 76 85 50 85 C 24 85 14 68 22 55 Z" stroke="#ff00ff" stroke-width="2" fill="none" />
              <path d="M 33 55 Q 38 50 40 68" stroke="#ff00ff" stroke-width="2" fill="none" />
              <path d="M 67 55 Q 62 50 60 68" stroke="#ff00ff" stroke-width="2" fill="none" />
            </svg>
          </div>
          <div class="glitch-wrapper"><h1 class="glitch">Jiwoohaha.</h1></div>
          <p class="short-desc">> SYSTEM_ADMIN</p>

          <div class="radar-container">
            <svg class="radar-svg" viewBox="0 0 100 100">
              <polygon points="50,10 90,35 90,75 50,95 10,75 10,35" fill="none" stroke="#333" />
              <polygon points="50,20 80,40 75,70 50,85 25,70 30,40" class="radar-web" />
              <text x="50" y="8" text-anchor="middle" class="radar-label">웹</text>
              <text x="92" y="35" class="radar-label">포너블</text>
              <text x="92" y="75" class="radar-label">개발</text>
              <text x="50" y="105" text-anchor="middle" class="radar-label">암호학</text>
              <text x="8" y="75" text-anchor="end" class="radar-label">법학</text>
              <text x="8" y="35" text-anchor="end" class="radar-label">리버싱</text>
            </svg>
          </div>

          <button class="btn-about" id="aboutToggle">소개 (About Me) <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg></button>
          <div class="about-content" id="aboutContent">
            정보보호 변호사를 꿈꾸는 <span class="highlight">스마트보안학부 25학번 박지우</span>입니다. 안전한 디지털 세상을 위해 법과 기술을 공부합니다.
          </div>

          <div class="social-links">
            <a href="https://github.com/jiwoohaha" target="_blank" class="social-btn">GitHub</a>
            <a href="https://discord.com/users/603818932427554827" target="_blank" class="social-btn discord">smartsecurity</a>
          </div>

          <nav class="category-menu" id="categoryMenu">
            <h3>[ 게시판 목록 ]</h3>
            <button class="cat-btn active" data-filter="all">전체보기 (<span id="count-all">0</span>)</button>
            <button class="cat-btn" data-filter="개발">개발</button>
            <button class="cat-btn" data-filter="CTF/Wargame">CTF/Wargame</button>
            <button class="cat-btn" data-filter="Bug Bounty">Bug Bounty</button>
            <button class="cat-btn" data-filter="블로그/기술컨퍼런스">기술컨퍼런스</button>
            <button class="cat-btn" data-filter="논문/컨퍼런스">논문/연구</button>
            <button class="cat-btn" data-filter="공모전/자격증">공모전/자격증</button>
            <button class="cat-btn" data-filter="기타">기타</button>
          </nav>
        </div>
      </div>
    </aside>

    <main>
      <div class="neon-box-wrapper">
        <div class="neon-box">
          <div class="main-header"><h2 id="currentCategoryTitle">> 전체보기</h2><span id="currentCategoryCount">불러오는 중...</span></div>
          <div class="post-list" id="postListContainer"><p class="loading-msg">데이터 동기화 중...</p></div>
        </div>
      </div>
    </main>

    <aside class="sidebar sidebar-right">
      <div class="neon-box-wrapper">
        <div class="neon-box">
          <div class="widget"><h3>SEARCH_DB</h3><input type="text" id="searchInput" class="search-box" placeholder="키워드 입력..."></div>
          <div class="widget"><h3>TRAFFIC</h3><div class="visualizer"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div></div>
          <div class="widget"><h3>SYSTEM_LOG</h3><div class="terminal-widget"><div class="term-output" id="termOutput"><p>Welcome to Jiwoo OS.</p></div><div class="term-input-line"><span>$</span><input type="text" id="termInput" class="term-input"></div></div></div>
        </div>
      </div>
    </aside>

  </div>

  <div class="fab-write" id="openModalBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg></div>

  <div class="modal-overlay" id="actionModal">
    <div class="modal-content">
      <button class="modal-close" id="closeModalBtn">&times;</button>
      <div id="authSection" class="modal-section">
        <h2 class="modal-title">관리자 인증</h2>
        <input type="password" id="adminPw" class="form-control" placeholder="GitHub Token 입력...">
        <button class="btn-submit" id="checkPwBtn">인증하기</button>
      </div>
      <div id="writeSection" class="modal-section">
        <h2 class="modal-title" id="writeTitle">새 글 작성</h2>
        <select id="postCategory" class="form-control">
          <option value="개발">개발</option><option value="CTF/Wargame">CTF/Wargame</option><option value="Bug Bounty">Bug Bounty</option>
          <option value="블로그/기술컨퍼런스">블로그/기술컨퍼런스</option><option value="논문/컨퍼런스">논문/컨퍼런스</option><option value="공모전/자격증">공모전/자격증</option><option value="기타">기타</option>
        </select>
        <input type="text" id="postTitle" class="form-control" placeholder="제목...">
        <div id="editor-container"></div>
        <button class="btn-submit" id="submitPostBtn" style="margin-top:20px;">발행하기</button>
      </div>
      <div id="deleteSection" class="modal-section">
        <h2 class="modal-title" style="color:red">글 삭제</h2>
        <p id="deleteTargetTitle" style="margin-bottom:20px"></p>
        <button class="btn-submit" id="confirmDeleteBtn" style="background:red">영구 삭제</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
  <script>
    // 1. UI Interaction
    const cursor = document.createElement('div'); cursor.classList.add('custom-cursor'); document.body.appendChild(cursor);
    document.addEventListener('mousemove', e => { cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px'; });
    document.getElementById('aboutToggle').onclick = () => document.getElementById('aboutContent').classList.toggle('show');

    // 2. Terminal
    const termInput = document.getElementById('termInput'); const termOutput = document.getElementById('termOutput');
    termInput.onkeydown = (e) => { if(e.key === 'Enter'){ const cmd = termInput.value; termOutput.innerHTML += `<p>$ ${cmd}</p>`; termInput.value=''; if(cmd==='matrix') toggleMatrix(); termOutput.scrollTop = termOutput.scrollHeight; } };

    // 3. Matrix
    const canvas = document.getElementById('matrixCanvas'); const ctx = canvas.getContext('2d');
    let matrixOn = false; let drops = [];
    function drawMatrix() { ctx.fillStyle = 'rgba(0,0,0,0.05)'; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.fillStyle='#0f0'; drops.forEach((y,i)=>{ ctx.fillText(String.fromCharCode(Math.random()*128), i*15, y*15); if(y*15 > canvas.height && Math.random()>0.975) drops[i]=0; drops[i]++; }); }
    function toggleMatrix() { matrixOn = !matrixOn; canvas.style.opacity = matrixOn ? 0.5 : 0; if(matrixOn) { canvas.width=innerWidth; canvas.height=innerHeight; drops=Array(Math.floor(innerWidth/15)).fill(1); setInterval(drawMatrix, 33); } }

    // 4. Core Blog Logic
    const GITHUB_OWNER = 'jiwoohaha', GITHUB_REPO = 'jiwoohaha.github.io';
    let githubToken = '', allPostsData = [], targetFileInfo = null, isEditMode = false;
    
    var quill = new Quill('#editor-container', { theme: 'snow', modules: { toolbar: [ [{header:[1,2,false]}],['bold','italic','underline'],['link','image','video'],['code-block'] ] } });

    async function loadPostList() {
      try {
        const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/posts?t=${Date.now()}`, { headers: githubToken ? {Authorization: `Bearer ${githubToken}`} : {} });
        if(!res.ok) return;
        const files = await res.json();
        allPostsData = files.filter(f=>f.name.endsWith('.html')).reverse().map(f => {
          const name = f.name.replace('.html','');
          const match = name.match(/^(\d{4}-\d{2}-\d{2})-\[(.+?)\]-(.+)$/);
          return match ? { ...f, date: match[1], category: match[2].replace(/_/g, '/'), title: match[3].replace(/-/g,' ') } : { ...f, date:'', category:'기타', title: name };
        });
        document.getElementById('count-all').innerText = allPostsData.length;
        renderPosts('all');
      } catch(e) { console.error(e); }
    }

    function renderPosts(cat, query='') {
      const container = document.getElementById('postListContainer'); container.innerHTML = '';
      let filtered = cat === 'all' ? allPostsData : allPostsData.filter(p => p.category === cat);
      if(query) filtered = filtered.filter(p => p.title.toLowerCase().includes(query.toLowerCase()));
      
      document.getElementById('currentCategoryTitle').innerText = `> ${cat === 'all' ? '전체보기' : cat}`;
      document.getElementById('currentCategoryCount').innerText = `${filtered.length}개의 파일`;

      filtered.forEach(p => {
        const card = document.createElement('div'); card.className = 'post-item-wrapper';
        card.innerHTML = `<a href="/${p.path}" class="post-item"><span class="post-cat-badge">${p.category}</span><span class="post-date">${p.date}</span><div class="post-title">${p.title}</div></a>
        <div class="card-actions"><button class="btn-icon edit-btn" data-path="${p.path}">✏️</button><button class="btn-icon del-btn" data-path="${p.path}" data-sha="${p.sha}">🗑️</button></div>`;
        container.appendChild(card);
      });

      container.querySelectorAll('.edit-btn').forEach(b => b.onclick = () => { targetFileInfo = {path: b.dataset.path}; openModal('edit'); });
      container.querySelectorAll('.del-btn').forEach(b => b.onclick = () => { targetFileInfo = {path: b.dataset.path, sha: b.dataset.sha}; openModal('delete'); });
    }

    // Modal Control
    const modal = document.getElementById('actionModal');
    function openModal(act) {
      modal.classList.add('active');
      document.querySelectorAll('.modal-section').forEach(s => s.classList.remove('active'));
      if(!githubToken) document.getElementById('authSection').classList.add('active');
      else {
        if(act === 'edit') fetchForEdit();
        else document.getElementById(act + 'Section').classList.add('active');
      }
    }
    document.getElementById('closeModalBtn').onclick = () => modal.classList.remove('active');
    document.getElementById('checkPwBtn').onclick = () => { githubToken = document.getElementById('adminPw').value; openModal('write'); };
    document.getElementById('openModalBtn').onclick = () => { isEditMode = false; quill.setContents([]); openModal('write'); };

    async function fetchForEdit() {
      const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${targetFileInfo.path}`, { headers: {Authorization: `Bearer ${githubToken}`} });
      const data = await res.json();
      const html = decodeURIComponent(escape(atob(data.content)));
      const doc = new DOMParser().parseFromString(html, 'text/html');
      document.getElementById('postTitle').value = doc.querySelector('h1').innerText;
      quill.root.innerHTML = doc.querySelector('.ql-editor').innerHTML;
      isEditMode = true; targetFileInfo.sha = data.sha;
      document.getElementById('writeSection').classList.add('active');
    }

    document.getElementById('submitPostBtn').onclick = async () => {
      const title = document.getElementById('postTitle').value;
      const cat = document.getElementById('postCategory').value;
      const content = quill.root.innerHTML;
      const date = new Date().toISOString().split('T')[0];
      const safeCat = cat.replace(/\//g, '_');
      const path = isEditMode ? targetFileInfo.path : `posts/${date}-[${safeCat}]-${title.replace(/ /g, '-')}.html`;

      const fullHtml = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${title}</title><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"><link href="https://cdn.quilljs.com/1.3.6/quill.core.css" rel="stylesheet"><style>body{background:#050002;color:#fff;font-family:Pretendard;padding:40px;line-height:1.8}.content-box{max-width:800px;margin:0 auto;background:#111;padding:40px;border-radius:20px;border:1px solid #ff00ff}.cat-badge{background:rgba(0,255,255,0.1);color:#0df;padding:4px 10px;border-radius:4px;font-size:0.9rem}h1{font-size:2.5rem;margin:20px 0}a{color:#ff00ff;text-decoration:none;border:1px solid #ff00ff;padding:10px 20px;border-radius:8px;display:inline-block;margin-top:40px}</style></head><body><div class="content-box"><div><span class="cat-badge">${cat}</span> <span>${date}</span></div><h1>${title}</h1><hr style="border:0;height:1px;background:#333;margin:30px 0"><div class="ql-editor">${content}</div><a href="/index.html">< 목록으로</a></div></body></html>`;

      const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${path}`, {
        method: 'PUT',
        headers: {Authorization: `Bearer ${githubToken}`, 'Content-Type': 'application/json'},
        body: JSON.stringify({ message: `Post: ${title}`, content: btoa(unescape(encodeURIComponent(fullHtml))), ...(isEditMode ? {sha: targetFileInfo.sha} : {}) })
      });
      if(res.ok) { alert('완료!'); location.reload(); }
    };

    document.getElementById('confirmDeleteBtn').onclick = async () => {
      const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${targetFileInfo.path}`, {
        method: 'DELETE',
        headers: {Authorization: `Bearer ${githubToken}`, 'Content-Type': 'application/json'},
        body: JSON.stringify({ message: 'Delete', sha: targetFileInfo.sha })
      });
      if(res.ok) { alert('삭제됨'); location.reload(); }
    };

    document.querySelectorAll('.cat-btn').forEach(btn => btn.onclick = () => { document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderPosts(btn.dataset.filter); });
    document.getElementById('searchInput').onkeyup = (e) => renderPosts(document.querySelector('.cat-btn.active').dataset.filter, e.target.value);
    
    window.onload = loadPostList;
  </script>
</body>
</html>
